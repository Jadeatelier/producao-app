<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Registo de Produção</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: { colors: { extrusao: '#2563EB', injecao: '#EA580C' } } }
  }
</script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F1F5F9; }
  .pin-btn { width:72px; height:72px; font-size:1.5rem; font-weight:700; border-radius:50%; border:2px solid #CBD5E1; background:white; cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center; }
  .pin-btn:hover { background:#EFF6FF; border-color:#3B82F6; }
  .pin-btn:active { background:#DBEAFE; transform:scale(.95); }
  .pin-dot { width:14px; height:14px; border-radius:50%; background:#CBD5E1; transition:background .2s; }
  .pin-dot.filled { background:#1D4ED8; }
  .badge { display:inline-flex; align-items:center; padding:2px 10px; border-radius:9999px; font-size:.75rem; font-weight:600; }
  .table-row:hover { background:#F8FAFC; }
  .sidebar-item { display:flex; align-items:center; gap:10px; padding:10px 16px; border-radius:8px; cursor:pointer; font-size:.9rem; font-weight:500; color:#64748B; transition:all .15s; }
  .sidebar-item:hover { background:#F1F5F9; color:#1E293B; }
  .sidebar-item.active { background:#EFF6FF; color:#2563EB; }
  .chart-container { position:relative; height:220px; }
  @media(max-width:640px) { .pin-btn { width:64px; height:64px; font-size:1.3rem; } }
  ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-track { background:#F1F5F9; } ::-webkit-scrollbar-thumb { background:#CBD5E1; border-radius:3px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef, createContext, useContext } = React;

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const SHIFTS = { 1:'Manhã (08-17)', 2:'Tarde (17-01)', 3:'Noite (01-08)' };
function currentShiftNum() { const h=new Date().getHours(); if(h>=8&&h<17)return 1; if(h>=17||h===0)return 2; return 3; }
const SHIFT_COLORS = { 1:'bg-amber-100 text-amber-800', 2:'bg-orange-100 text-orange-800', 3:'bg-indigo-100 text-indigo-800' };
const STATUS_LABELS = { pending:'Pendente', active:'Ativa', completed:'Concluída', cancelled:'Cancelada', open:'Aberto', closed:'Fechado' };
const STATUS_COLORS = { pending:'bg-gray-100 text-gray-700', active:'bg-green-100 text-green-700', completed:'bg-blue-100 text-blue-700', cancelled:'bg-red-100 text-red-700', open:'bg-green-100 text-green-700', closed:'bg-gray-100 text-gray-700' };
const UNIT_LABELS = { atados:'Atados', metros:'Metros', pecas:'Peças' };

// ─── API ──────────────────────────────────────────────────────────────────────
const api = {
  token: () => localStorage.getItem('token'),
  h: () => ({ 'Content-Type':'application/json', 'Authorization':`Bearer ${api.token()}` }),
  get: async (u) => { const r = await fetch(u,{headers:api.h()}); if(!r.ok){const e=await r.json().catch(()=>({})); throw new Error(e.error||'Erro'); } return r.json(); },
  post: async (u,b) => { const r = await fetch(u,{method:'POST',headers:api.h(),body:JSON.stringify(b)}); if(!r.ok){const e=await r.json().catch(()=>({})); throw new Error(e.error||'Erro'); } return r.json(); },
  put: async (u,b) => { const r = await fetch(u,{method:'PUT',headers:api.h(),body:JSON.stringify(b)}); if(!r.ok){const e=await r.json().catch(()=>({})); throw new Error(e.error||'Erro'); } return r.json(); },
  del: async (u) => { const r = await fetch(u,{method:'DELETE',headers:api.h()}); if(!r.ok){const e=await r.json().catch(()=>({})); throw new Error(e.error||'Erro'); } return r.json(); },
};

// ─── CONTEXT ─────────────────────────────────────────────────────────────────
const AuthCtx = createContext(null);
function AuthProvider({children}) {
  const [user,setUser] = useState(() => { try { const t=localStorage.getItem('token'); if(!t)return null; const p=JSON.parse(atob(t.split('.')[1])); if(p.exp*1000<Date.now()){localStorage.removeItem('token');return null;} return p; } catch{return null;} });
  const login = useCallback((token) => { localStorage.setItem('token',token); const p=JSON.parse(atob(token.split('.')[1])); setUser(p); },[]);
  const logout = useCallback(() => { localStorage.removeItem('token'); setUser(null); },[]);
  return <AuthCtx.Provider value={{user,login,logout}}>{children}</AuthCtx.Provider>;
}
const useAuth = () => useContext(AuthCtx);

// ─── UI COMPONENTS ────────────────────────────────────────────────────────────
function Btn({children,onClick,variant='primary',size='md',disabled,className='',type='button'}) {
  const base = 'inline-flex items-center justify-center gap-2 font-semibold rounded-lg transition-all focus:outline-none focus:ring-2 focus:ring-offset-1 disabled:opacity-50 disabled:cursor-not-allowed';
  const vars = { primary:'bg-blue-600 text-white hover:bg-blue-700 focus:ring-blue-500', danger:'bg-red-600 text-white hover:bg-red-700 focus:ring-red-500', success:'bg-green-600 text-white hover:bg-green-700 focus:ring-green-500', outline:'bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 focus:ring-gray-400', ghost:'text-gray-600 hover:bg-gray-100 focus:ring-gray-400' };
  const sizes = { sm:'px-3 py-1.5 text-sm', md:'px-4 py-2.5 text-sm', lg:'px-6 py-3 text-base', xl:'px-8 py-4 text-lg' };
  return <button type={type} className={`${base} ${vars[variant]} ${sizes[size]} ${className}`} onClick={onClick} disabled={disabled}>{children}</button>;
}

function Modal({open,onClose,title,children,size='md'}) {
  if(!open) return null;
  const sizes = { sm:'max-w-md', md:'max-w-lg', lg:'max-w-2xl', xl:'max-w-4xl' };
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="fixed inset-0 bg-black/40 backdrop-blur-sm"/>
      <div className={`relative bg-white rounded-2xl shadow-2xl w-full ${sizes[size]} max-h-[90vh] overflow-y-auto`}>
        <div className="flex items-center justify-between p-5 border-b">
          <h2 className="text-lg font-bold text-gray-900">{title}</h2>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
        </div>
        <div className="p-5">{children}</div>
      </div>
    </div>
  );
}

function Field({label,children,required}) {
  return (
    <div>
      <label className="block text-sm font-semibold text-gray-700 mb-1">{label}{required&&<span className="text-red-500 ml-1">*</span>}</label>
      {children}
    </div>
  );
}
function Input({label,required,...p}) {
  const cls = "w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent";
  return label ? <Field label={label} required={required}><input className={cls} {...p}/></Field> : <input className={cls} {...p}/>;
}
function Select({label,required,options=[],placeholder,...p}) {
  const cls = "w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white";
  return (
    <Field label={label} required={required}>
      <select className={cls} {...p}>
        {placeholder&&<option value="">{placeholder}</option>}
        {options.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
      </select>
    </Field>
  );
}
function Textarea({label,required,...p}) {
  const cls = "w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none";
  return label ? <Field label={label} required={required}><textarea className={cls} rows={3} {...p}/></Field> : <textarea className={cls} rows={3} {...p}/>;
}

function Badge({text,color='gray'}) {
  const colors = { gray:'bg-gray-100 text-gray-700', green:'bg-green-100 text-green-700', blue:'bg-blue-100 text-blue-700', red:'bg-red-100 text-red-700', amber:'bg-amber-100 text-amber-800', orange:'bg-orange-100 text-orange-800', indigo:'bg-indigo-100 text-indigo-800' };
  return <span className={`badge ${colors[color]||color}`}>{text}</span>;
}

function Alert({type='info',children}) {
  const styles = { info:'bg-blue-50 border-blue-200 text-blue-800', error:'bg-red-50 border-red-200 text-red-800', success:'bg-green-50 border-green-200 text-green-800', warning:'bg-amber-50 border-amber-200 text-amber-800' };
  return <div className={`rounded-lg border p-3 text-sm ${styles[type]}`}>{children}</div>;
}

function KpiCard({label,value,sub,color='blue'}) {
  const colors = { blue:'border-l-blue-500 bg-blue-50', green:'border-l-green-500 bg-green-50', red:'border-l-red-500 bg-red-50', amber:'border-l-amber-500 bg-amber-50', purple:'border-l-purple-500 bg-purple-50' };
  return (
    <div className={`rounded-xl border-l-4 p-4 ${colors[color]}`}>
      <div className="text-xs text-gray-500 font-medium uppercase tracking-wide">{label}</div>
      <div className="text-2xl font-bold text-gray-900 mt-1">{value}</div>
      {sub&&<div className="text-xs text-gray-500 mt-0.5">{sub}</div>}
    </div>
  );
}

function Spinner() { return <div className="w-8 h-8 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"/>; }

function EmptyState({icon='📋',title,desc}) {
  return (
    <div className="flex flex-col items-center justify-center py-12 text-center">
      <div className="text-4xl mb-3">{icon}</div>
      <div className="text-gray-600 font-medium">{title}</div>
      {desc&&<div className="text-gray-400 text-sm mt-1">{desc}</div>}
    </div>
  );
}

function ConfirmModal({open,onClose,onConfirm,title,message,variant='danger'}) {
  return (
    <Modal open={open} onClose={onClose} title={title} size="sm">
      <p className="text-gray-600 mb-6">{message}</p>
      <div className="flex gap-3 justify-end">
        <Btn variant="outline" onClick={onClose}>Cancelar</Btn>
        <Btn variant={variant} onClick={()=>{onConfirm();onClose();}}>Confirmar</Btn>
      </div>
    </Modal>
  );
}

// ─── PIN PAD ──────────────────────────────────────────────────────────────────
function PinPad({value='',onChange,maxLen=4}) {
  const press = (d) => { if(value.length<maxLen) onChange(value+d); };
  const del = () => onChange(value.slice(0,-1));
  return (
    <div className="flex flex-col items-center gap-5">
      <div className="flex gap-3">
        {Array.from({length:maxLen},(_,i)=>(
          <div key={i} className={`pin-dot ${i<value.length?'filled':''}`}/>
        ))}
      </div>
      <div className="grid grid-cols-3 gap-3">
        {[1,2,3,4,5,6,7,8,9].map(n=>(
          <button key={n} className="pin-btn" onClick={()=>press(String(n))}>{n}</button>
        ))}
        <div/>
        <button className="pin-btn" onClick={()=>press('0')}>0</button>
        <button className="pin-btn text-red-500" onClick={del}>⌫</button>
      </div>
    </div>
  );
}

// ─── LOGIN / MACHINE SELECT ───────────────────────────────────────────────────
function LoginPage() {
  const {login} = useAuth();
  const [step, setStep] = useState('machines'); // 'machines' | 'pin' | 'admin' | 'quality'
  const [machines, setMachines] = useState([]);
  const [selMachine, setSelMachine] = useState(null);
  const [opNumber, setOpNumber] = useState('');
  const [opSearch, setOpSearch] = useState('');
  const [operators, setOperators] = useState([]);
  const [pin, setPin] = useState('');
  const [adminPwd, setAdminPwd] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const [selShift, setSelShift] = useState(currentShiftNum()); // turno escolhido pelo operador

  useEffect(()=>{
    fetch('/api/machines',{headers:api.h()}).then(r=>r.json()).then(setMachines).catch(()=>{});
    fetch('/api/operators/public').then(r=>r.json()).then(setOperators).catch(()=>{});
  },[]);

  const selectMachine = (m) => { setSelMachine(m); setPin(''); setOpNumber(''); setOpSearch(''); setError(''); setSelShift(currentShiftNum()); setStep('pin'); };

  const submitPin = async () => {
    if(!opNumber||pin.length<4){ setError('Insira o nº de operador e o PIN (4 dígitos)'); return; }
    setLoading(true); setError('');
    try {
      const res = await api.post('/api/auth/operator',{number:opNumber.trim(),pin});
      login(res.token);
      if(res.operator?.role==='quality') { window.location.hash='#/quality'; }
      else if(step==='quality') { window.location.hash='#/quality'; }
      else {
        // Guarda o turno escolhido para ser usado ao criar o turno na máquina
        sessionStorage.setItem('pendingShiftNumber', String(selShift));
        window.location.hash = `#/operator/${selMachine.id}`;
      }
    } catch(e){ setError(e.message); } finally{ setLoading(false); }
  };

  const submitAdmin = async () => {
    setLoading(true); setError('');
    try {
      const res = await api.post('/api/auth/admin',{password:adminPwd});
      login(res.token);
      window.location.hash = '#/admin/dashboard';
    } catch(e){ setError(e.message); } finally{ setLoading(false); }
  };

  const extrusao = machines.filter(m=>m.type==='extrusao');
  const injecao = machines.filter(m=>m.type==='injecao');
  const shiftNum = currentShiftNum();

  if(step==='admin') return (
    <div className="min-h-screen flex items-center justify-center bg-slate-800 p-4">
      <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm">
        <div className="text-center mb-6">
          <div className="text-3xl mb-2">⚙️</div>
          <h2 className="text-xl font-bold text-gray-900">Área de Admin</h2>
        </div>
        {error&&<Alert type="error" className="mb-4">{error}</Alert>}
        <div className="space-y-4">
          <Input label="Password" type="password" value={adminPwd} onChange={e=>setAdminPwd(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submitAdmin()} autoFocus/>
          <Btn className="w-full" onClick={submitAdmin} disabled={loading} size="lg">{loading?'A entrar…':'Entrar'}</Btn>
          <Btn variant="ghost" className="w-full" onClick={()=>{setStep('machines');setError('');}}>← Voltar</Btn>
        </div>
      </div>
    </div>
  );

  if(step==='quality') return (
    <div className="min-h-screen flex items-center justify-center bg-slate-800 p-4">
      <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm">
        <button onClick={()=>{setStep('machines');setError('');}} className="text-gray-400 hover:text-gray-600 text-sm mb-4">← Voltar</button>
        <div className="text-center mb-6">
          <div className="inline-block px-4 py-1.5 rounded-full text-sm font-bold mb-2 bg-purple-100 text-purple-700">🔍 Controlo de Qualidade</div>
          <div className="text-gray-500 text-sm">{SHIFTS[shiftNum]}</div>
        </div>
        {error&&<div className="mb-4"><Alert type="error">{error}</Alert></div>}
        <div className="mb-4">
          <div className="text-sm font-semibold text-gray-700 mb-2">Responsável de Qualidade</div>
          {opNumber ? (
            <div className="flex items-center justify-between bg-purple-50 border-2 border-purple-200 rounded-xl px-3 py-2.5">
              <div>
                <span className="font-semibold text-gray-900">{operators.find(o=>o.number===opNumber)?.name||opNumber}</span>
                <span className="text-gray-400 text-xs ml-2">#{opNumber}</span>
              </div>
              <button onClick={()=>{setOpNumber('');setOpSearch('');}} className="text-gray-400 hover:text-red-500 text-sm ml-2">✕</button>
            </div>
          ) : (
            <div>
              <input type="text" value={opSearch} onChange={e=>setOpSearch(e.target.value)} placeholder="Pesquisar nome ou número…"
                className="w-full border-2 border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-purple-400"/>
              <div className="mt-1 border border-gray-200 rounded-xl overflow-hidden max-h-44 overflow-y-auto shadow-md">
                {(()=>{ const qOps=operators.filter(o=>o.role==='quality'); const filtered=opSearch?qOps.filter(o=>o.name.toLowerCase().includes(opSearch.toLowerCase())||o.number.includes(opSearch)):qOps; return filtered.length>0?filtered.map(o=>(
                  <button key={o.number} onClick={()=>{setOpNumber(o.number);setOpSearch('');}}
                    className="w-full text-left px-3 py-2.5 hover:bg-purple-50 border-b border-gray-100 last:border-b-0 text-sm transition-colors">
                    <span className="font-medium text-gray-900">{o.name}</span>
                    <span className="text-gray-400 ml-2">#{o.number}</span>
                  </button>
                )):<div className="px-3 py-3 text-gray-400 text-xs text-center">{operators.length===0?'A carregar…':'Sem responsáveis de qualidade definidos'}</div>; })()}
              </div>
            </div>
          )}
        </div>
        <div className="mb-6">
          <div className="text-sm font-semibold text-gray-700 mb-3">PIN</div>
          <PinPad value={pin} onChange={setPin} maxLen={4}/>
        </div>
        <Btn className="w-full" size="lg" onClick={submitPin} disabled={loading||pin.length<4||!opNumber} variant="primary">
          {loading?'A verificar…':'Entrar na Qualidade →'}
        </Btn>
      </div>
    </div>
  );

  if(step==='pin') return (
    <div className="min-h-screen flex items-center justify-center bg-slate-800 p-4">
      <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm">
        <button onClick={()=>{setStep('machines');setError('');}} className="text-gray-400 hover:text-gray-600 text-sm mb-4">← Voltar</button>
        <div className="text-center mb-4">
          <div className={`inline-block px-4 py-1.5 rounded-full text-sm font-bold mb-2 ${selMachine.type==='extrusao'?'bg-blue-100 text-blue-700':'bg-orange-100 text-orange-700'}`}>{selMachine.name}</div>
        </div>
        {/* Seletor de turno — operador confirma em qual turno está */}
        <div className="mb-4">
          <div className="text-sm font-semibold text-gray-700 mb-2">Turno</div>
          <div className="grid grid-cols-3 gap-2">
            {[1,2,3].map(t=>(
              <button key={t} onClick={()=>setSelShift(t)}
                className={`py-2.5 rounded-xl text-sm font-bold border-2 transition-colors ${selShift===t?'bg-blue-600 border-blue-600 text-white':'border-gray-200 text-gray-600 hover:border-blue-400 hover:text-blue-600'}`}>
                <div>T{t}</div>
                <div className={`text-xs font-normal mt-0.5 ${selShift===t?'text-blue-100':'text-gray-400'}`}>{t===1?'Manhã':t===2?'Tarde':'Noite'}</div>
              </button>
            ))}
          </div>
          <p className="text-xs text-gray-400 mt-1.5 text-center">Confirme o turno em que está a trabalhar</p>
        </div>
        {error&&<div className="mb-4"><Alert type="error">{error}</Alert></div>}
        <div className="mb-4">
          <div className="text-sm font-semibold text-gray-700 mb-2">Operador</div>
          {opNumber ? (
            <div className="flex items-center justify-between bg-blue-50 border-2 border-blue-200 rounded-xl px-3 py-2.5">
              <div>
                <span className="font-semibold text-gray-900">{operators.find(o=>o.number===opNumber)?.name||opNumber}</span>
                <span className="text-gray-400 text-xs ml-2">#{opNumber}</span>
              </div>
              <button onClick={()=>{setOpNumber('');setOpSearch('');}} className="text-gray-400 hover:text-red-500 text-sm ml-2">✕</button>
            </div>
          ) : (
            <div>
              <input type="text" value={opSearch} onChange={e=>setOpSearch(e.target.value)} placeholder="Pesquisar nome ou número…"
                className="w-full border-2 border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-blue-400"/>
              <div className="mt-1 border border-gray-200 rounded-xl overflow-hidden max-h-44 overflow-y-auto shadow-md">
                {(opSearch ? operators.filter(o=>o.name.toLowerCase().includes(opSearch.toLowerCase())||o.number.includes(opSearch)) : operators).map(o=>(
                  <button key={o.number} onClick={()=>{setOpNumber(o.number);setOpSearch('');}}
                    className="w-full text-left px-3 py-2.5 hover:bg-blue-50 border-b border-gray-100 last:border-b-0 text-sm transition-colors">
                    <span className="font-medium text-gray-900">{o.name}</span>
                    <span className="text-gray-400 ml-2">#{o.number}</span>
                  </button>
                ))}
                {operators.length===0&&<div className="px-3 py-3 text-gray-400 text-xs text-center">A carregar…</div>}
              </div>
            </div>
          )}
        </div>
        <div className="mb-6">
          <div className="text-sm font-semibold text-gray-700 mb-3">PIN</div>
          <PinPad value={pin} onChange={setPin} maxLen={4}/>
        </div>
        <Btn className="w-full" size="lg" onClick={submitPin} disabled={loading||pin.length<4||!opNumber}>
          {loading?'A verificar…':'Entrar →'}
        </Btn>
        {!opNumber&&<p className="text-xs text-gray-400 text-center mt-2">Selecione um operador da lista acima</p>}
      </div>
    </div>
  );

  return (
    <div className="min-h-screen bg-slate-800 p-6">
      <div className="max-w-4xl mx-auto">
        <div className="flex justify-between items-center mb-8">
          <div>
            <h1 className="text-2xl font-bold text-white">Registo de Produção</h1>
            <p className="text-slate-400 text-sm mt-1">{new Date().toLocaleDateString('pt-PT',{weekday:'long',day:'numeric',month:'long'})} · <span className="font-medium text-slate-300">{SHIFTS[shiftNum]}</span></p>
          </div>
          <div className="flex gap-2">
            <button onClick={()=>{setStep('quality');setPin('');setOpNumber('');setOpSearch('');setError('');}} className="flex items-center gap-2 bg-purple-700 hover:bg-purple-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">🔍 Qualidade</button>
            <button onClick={()=>{setStep('admin');setError('');}} className="flex items-center gap-2 bg-slate-700 hover:bg-slate-600 text-slate-300 px-4 py-2 rounded-lg text-sm font-medium transition-colors">⚙️ Admin</button>
          </div>
        </div>

        {extrusao.length>0&&(
          <div className="mb-6">
            <div className="text-xs font-bold text-blue-400 uppercase tracking-widest mb-3">Extrusão</div>
            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
              {extrusao.map(m=>(
                <button key={m.id} onClick={()=>selectMachine(m)} className="bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white rounded-xl p-5 text-left transition-all hover:shadow-lg hover:-translate-y-0.5">
                  <div className="text-2xl mb-2">🏭</div>
                  <div className="font-bold text-lg">{m.name}</div>
                  {m.has_weighing===1&&<div className="text-blue-200 text-xs mt-1">⚖️ Com pesagem</div>}
                </button>
              ))}
            </div>
          </div>
        )}
        {injecao.length>0&&(
          <div>
            <div className="text-xs font-bold text-orange-400 uppercase tracking-widest mb-3">Injeção</div>
            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
              {injecao.map(m=>(
                <button key={m.id} onClick={()=>selectMachine(m)} className="bg-orange-600 hover:bg-orange-500 active:bg-orange-700 text-white rounded-xl p-5 text-left transition-all hover:shadow-lg hover:-translate-y-0.5">
                  <div className="text-2xl mb-2">⚙️</div>
                  <div className="font-bold text-lg">{m.name}</div>
                </button>
              ))}
            </div>
          </div>
        )}
        {machines.length===0&&<div className="text-center text-slate-400 py-20">A carregar máquinas…</div>}
      </div>
    </div>
  );
}

// ─── OPERATOR SHIFT VIEW ─────────────────────────────────────────────────────
function OperatorPage({machineId}) {
  const {user,logout} = useAuth();
  const [shift, setShift] = useState(null);
  const [order, setOrder] = useState(null);
  const [orders, setOrders] = useState([]);
  const [machine, setMachine] = useState(null);
  const [colors, setColors] = useState([]);
  const [codes, setCodes] = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(null); // 'entry'|'stoppage'|'weighing'|'order'|'close'
  const [error, setError] = useState('');
  const [palletEntry, setPalletEntry] = useState(null); // entry para mostrar código palete
  const [confirmDel, setConfirmDel] = useState(null); // {type:'entry'|'stop'|'weigh', id}
  const [orderHistory,setOrderHistory] = useState([]);
  const [historyOpen,setHistoryOpen] = useState(false);
  const [historyLoading,setHistoryLoading] = useState(false);

  const loadOrderHistory = async (orderId) => {
    setHistoryLoading(true);
    try { setOrderHistory(await api.get(`/api/orders/${orderId}/history`)); }
    catch(e){ console.error(e); }
    finally{ setHistoryLoading(false); }
  };

  const load = useCallback(async () => {
    try {
      const [mList,colorList,codeList] = await Promise.all([
        api.get('/api/machines'), api.get('/api/colors'), api.get('/api/stoppage-codes')
      ]);
      const m = mList.find(x=>x.id==machineId);
      setMachine(m);
      setColors(colorList);
      setCodes(codeList);
      const active = await api.get(`/api/shifts/active?machine_id=${machineId}`);
      if(active) {
        const detail = await api.get(`/api/shifts/${active.id}`);
        setShift(detail);
      } else {
        const ordList = await api.get(`/api/orders?status=active&machine_id=${machineId}`);
        setOrders(ordList);
        if(ordList.length===1) await openShift(ordList[0].id, machineId);
      }
    } catch(e){ setError(e.message); } finally{ setLoading(false); }
  },[machineId]);

  const openShift = async (orderId, mId) => {
    try {
      // Lê turno escolhido pelo operador no login (apenas na primeira abertura)
      const pendingShift = sessionStorage.getItem('pendingShiftNumber');
      sessionStorage.removeItem('pendingShiftNumber');
      const res = await api.post('/api/shifts',{
        order_id: orderId,
        machine_id: mId||machineId,
        shift_number: pendingShift ? Number(pendingShift) : undefined
      });
      const detail = await api.get(`/api/shifts/${res.id}`);
      setShift(detail);
      setModal(null);
    } catch(e){ setError(e.message); }
  };

  useEffect(()=>{ load(); },[load]);

  const refresh = async () => {
    if(!shift) return;
    const d = await api.get(`/api/shifts/${shift.id}`);
    setShift(d);
  };

  const closeShift = async () => {
    try { await api.put(`/api/shifts/${shift.id}/close`,{}); logout(); window.location.hash='#/'; } catch(e){ setError(e.message); }
  };

  const delEntry = async (id) => {
    try { await api.del(`/api/production-entries/${id}`); await refresh(); } catch(e){ setError(e.message); }
  };
  const delStop = async (id) => {
    try { await api.del(`/api/stoppages/${id}`); await refresh(); } catch(e){ setError(e.message); }
  };
  const delWeigh = async (id) => {
    try { await api.del(`/api/weighing/${id}`); await refresh(); } catch(e){ setError(e.message); }
  };
  const execDel = async () => {
    if(!confirmDel) return;
    if(confirmDel.type==='entry') await delEntry(confirmDel.id);
    else if(confirmDel.type==='stop') await delStop(confirmDel.id);
    else if(confirmDel.type==='weigh') await delWeigh(confirmDel.id);
    setConfirmDel(null);
  };

  if(loading) return <div className="min-h-screen flex items-center justify-center"><Spinner/></div>;

  if(!shift && orders.length===0) return (
    <div className="min-h-screen flex items-center justify-center p-4 bg-slate-800">
      <div className="bg-white rounded-2xl p-8 max-w-md w-full text-center shadow-2xl">
        <div className="text-5xl mb-4">🚫</div>
        <h2 className="text-xl font-bold text-gray-900 mb-2">Sem ordem ativa</h2>
        <p className="text-gray-500 mb-6">Não existe uma ordem de produção ativa para esta máquina. Contacte o supervisor.</p>
        <Btn variant="outline" onClick={()=>{window.location.hash='#/';}} className="w-full">← Voltar</Btn>
      </div>
    </div>
  );

  if(!shift && orders.length>0) return (
    <div className="min-h-screen flex items-center justify-center p-4 bg-slate-800">
      <div className="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl">
        <button onClick={()=>window.location.hash='#/'} className="text-gray-400 text-sm mb-4">← Voltar</button>
        <h2 className="text-xl font-bold text-gray-900 mb-4">Selecionar Ordem</h2>
        <div className="space-y-3">
          {orders.map(o=>(
            <button key={o.id} onClick={()=>openShift(o.id)} className="w-full text-left border-2 border-gray-200 hover:border-blue-500 rounded-xl p-4 transition-colors">
              <div className="font-bold text-gray-900">{o.order_number}</div>
              <div className="text-sm text-gray-500">{o.ref_code} — {o.ref_name}</div>
              <div className="text-sm text-gray-500">{o.color_name} · {o.quantity} {UNIT_LABELS[o.unit]}</div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );

  // Totals
  const entries = shift?.entries||[];
  const stoppages = shift?.stoppages||[];
  const weighing = shift?.weighing||[];
  const totRolls = entries.reduce((a,e)=>a+(e.rolls_bundles||0),0);
  const totMeters = entries.reduce((a,e)=>a+(e.meters_pieces||0),0);
  const totOk = entries.reduce((a,e)=>a+(e.pieces_ok||0),0);
  const totRej = entries.reduce((a,e)=>a+(e.rejected||0)+(e.pieces_rejected||0),0);
  const totStop = stoppages.reduce((a,s)=>a+(s.duration_minutes||0),0);
  const isExtrusao = shift.machine_type==='extrusao';

  return (
    <div className="min-h-screen bg-slate-100">
      {/* Header */}
      <div className={`${isExtrusao?'bg-blue-700':'bg-orange-600'} text-white px-4 py-3`}>
        <div className="max-w-4xl mx-auto flex flex-wrap items-center justify-between gap-2">
          <div>
            <div className="flex items-center gap-3 flex-wrap">
              <span className="font-bold text-lg">{shift.machine_name}</span>
              <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${SHIFT_COLORS[shift.shift_number]}`}>{SHIFTS[shift.shift_number]}</span>
              <span className="text-sm opacity-80">{shift.order_number}</span>
            </div>
            <div className="text-sm opacity-80 mt-0.5">
              {shift.ref_code&&<span>{shift.ref_code} · </span>}
              <span>{shift.operator_name} ({shift.operator_number})</span>
              <span className="ml-2">{shift.date} · {shift.start_time}</span>
            </div>
          </div>
          <Btn variant="danger" size="sm" onClick={()=>setModal('close')}>Fechar Turno</Btn>
        </div>
      </div>

      {/* Referência em destaque */}
      {shift.ref_code&&(
        <div className={`${isExtrusao?'bg-blue-50 border-blue-200':'bg-orange-50 border-orange-200'} border-b px-4 py-4`}>
          <div className="max-w-4xl mx-auto flex items-center gap-4">
            <div className={`w-1 h-12 rounded-full ${isExtrusao?'bg-blue-500':'bg-orange-500'}`}/>
            <div>
              <div className="text-xs font-bold uppercase tracking-widest text-gray-400 mb-0.5">Produto em produção</div>
              <div className="text-2xl font-extrabold text-gray-900 leading-none">{shift.ref_name||shift.ref_code}</div>
              {shift.ref_name&&<div className="text-xs text-gray-400 font-mono mt-0.5">{shift.ref_code}</div>}
            </div>
            <div className="ml-auto text-right flex gap-6">
              {shift.color_name&&(
                <div>
                  <div className="text-xs text-gray-400 mb-0.5">Cor</div>
                  <div className="font-bold text-gray-800">{shift.color_name}</div>
                </div>
              )}
              {shift.quantity&&(
                <div>
                  <div className="text-xs text-gray-400 mb-0.5">Objetivo</div>
                  <div className="font-bold text-gray-800">{shift.quantity} {UNIT_LABELS[shift.unit]||''}</div>
                </div>
              )}
            </div>
          </div>
          {shift.quantity>0&&(()=>{
            // Usa totais acumulados da ORDEM inteira (todos os turnos anteriores + atual)
            // Se orderTotals ainda não chegou, faz fallback para as entradas do turno atual
            const ot = shift.orderTotals;
            const producedOrder = ot
              ? (isExtrusao ? Number(ot.total_meters||0) : Number(ot.total_pieces_ok||0))
              : (isExtrusao ? entries.reduce((a,e)=>a+(e.meters_pieces||0),0) : entries.reduce((a,e)=>a+(e.pieces_ok||0),0));
            const producedShift = isExtrusao ? entries.reduce((a,e)=>a+(e.meters_pieces||0),0) : entries.reduce((a,e)=>a+(e.pieces_ok||0),0);
            const pct = Math.min(100, Math.round((producedOrder/shift.quantity)*100));
            return (
              <div className="mt-3">
                <div className="flex justify-between text-xs text-gray-500 mb-1">
                  <span>
                    Progresso total da ordem: <strong>{producedOrder}</strong> / {shift.quantity} {UNIT_LABELS[shift.unit]||''}
                    {producedShift>0&&producedOrder>producedShift&&<span className="text-gray-400 ml-1">(este turno: {producedShift})</span>}
                  </span>
                  <span className="font-bold">{pct}%</span>
                </div>
                <div className="w-full bg-gray-200 rounded-full h-3">
                  <div className={`h-3 rounded-full transition-all ${pct>=100?'bg-green-500':pct>=70?'bg-blue-500':'bg-amber-500'}`} style={{width:`${pct}%`}}/>
                </div>
              </div>
            );
          })()}
        </div>
      )}

      <div className="max-w-4xl mx-auto p-4 space-y-4">
        {error&&<Alert type="error">{error}</Alert>}

        {/* Summary cards */}
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
          {isExtrusao ? <>
            <KpiCard label="Rolos/Atados" value={totRolls} color="blue"/>
            <KpiCard label="Metros/Peças" value={totMeters} color="blue"/>
          </> : <>
            <KpiCard label="Peças OK" value={totOk} color="green"/>
          </>}
          <KpiCard label="Rejeitados" value={totRej} color="red"/>
          <KpiCard label="Paragens" value={`${totStop} min`} color="amber"/>
        </div>

        {/* Production entries */}
        <div className="bg-white rounded-xl shadow-sm overflow-hidden">
          <div className="flex items-center justify-between p-4 border-b">
            <h2 className="font-bold text-gray-900">Produção</h2>
            <Btn size="sm" onClick={()=>setModal('entry')}>+ Adicionar</Btn>
          </div>
          {entries.length===0 ? (
            <EmptyState icon="📦" title="Sem registos" desc="Clique em Adicionar para registar produção"/>
          ) : (
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead className="bg-gray-50 text-xs text-gray-500 uppercase">
                  <tr>
                    {isExtrusao ? <>
                      <th className="px-4 py-2 text-left">Cor</th>
                      <th className="px-4 py-2 text-right">Rolos/Atados</th>
                      <th className="px-4 py-2 text-right">Metros/Peças</th>
                    </> : <>
                      <th className="px-4 py-2 text-left">Cav. Ativas</th>
                      <th className="px-4 py-2 text-right">Contador</th>
                      <th className="px-4 py-2 text-right">Peças OK</th>
                    </>}
                    <th className="px-4 py-2 text-right">Rejeitados</th>
                    {!isExtrusao&&<th className="px-4 py-2 text-left">Acabamentos</th>}
                    <th className="px-4 py-2 text-right">Início</th>
                    <th className="px-4 py-2 text-right">Fim</th>
                    <th className="px-4 py-2"/>
                  </tr>
                </thead>
                <tbody>
                  {entries.map(e=>(
                    <tr key={e.id} className="border-t table-row">
                      {isExtrusao ? <>
                        <td className="px-4 py-2.5 font-medium">{e.color||'—'}</td>
                        <td className="px-4 py-2.5 text-right">{e.rolls_bundles||0}</td>
                        <td className="px-4 py-2.5 text-right">{e.meters_pieces||0}</td>
                      </> : <>
                        <td className="px-4 py-2.5">{e.active_cavities||'—'}</td>
                        <td className="px-4 py-2.5 text-right">{e.counter||'—'}</td>
                        <td className="px-4 py-2.5 text-right font-medium text-green-700">{e.pieces_ok||0}</td>
                      </>}
                      <td className="px-4 py-2.5 text-right text-red-600">{e.rejected||e.pieces_rejected||0}</td>
                      {!isExtrusao&&<td className="px-4 py-2.5 text-gray-500 text-xs">{e.finishing||'—'}</td>}
                      <td className="px-4 py-2.5 text-right text-gray-500 text-xs">{e.start_time||e.created_at?.slice(11,16)||'—'}</td>
                      <td className="px-4 py-2.5 text-right text-gray-500 text-xs">{e.end_time||'—'}</td>
                      <td className="px-4 py-2.5 text-right">
                        <div className="flex items-center gap-1 justify-end">
                          <button onClick={()=>setPalletEntry(e)} className="text-purple-400 hover:text-purple-600 text-xs" title="Ver código de palete">🏷️</button>
                          <button onClick={()=>setConfirmDel({type:'entry',id:e.id})} className="text-red-400 hover:text-red-600 text-xs">✕</button>
                        </div>
                      </td>
                    </tr>
                  ))}
                  <tr className="border-t bg-gray-50 font-bold text-sm">
                    <td className="px-4 py-2" colSpan={2}>Total</td>
                    {isExtrusao ? <>
                      <td className="px-4 py-2 text-right">{totRolls}</td>
                      <td className="px-4 py-2 text-right">{totMeters}</td>
                    </> : <>
                      <td className="px-4 py-2 text-right"/>
                      <td className="px-4 py-2 text-right text-green-700">{totOk}</td>
                    </>}
                    <td className="px-4 py-2 text-right text-red-600">{totRej}</td>
                    {!isExtrusao&&<td/>}
                    <td colSpan={3}/>
                  </tr>
                </tbody>
              </table>
            </div>
          )}
        </div>

        {/* Stoppages */}
        <div className="bg-white rounded-xl shadow-sm overflow-hidden">
          <div className="flex items-center justify-between p-4 border-b">
            <h2 className="font-bold text-gray-900">Paragens <span className="text-sm font-normal text-gray-400">({totStop} min total)</span></h2>
            <Btn size="sm" variant="outline" onClick={()=>setModal('stoppage')}>+ Paragem</Btn>
          </div>
          {stoppages.length===0 ? (
            <div className="px-4 py-6 text-center text-gray-400 text-sm">Sem paragens registadas</div>
          ) : (
            <table className="w-full text-sm">
              <thead className="bg-gray-50 text-xs text-gray-500 uppercase">
                <tr>
                  <th className="px-4 py-2 text-left">Código</th>
                  <th className="px-4 py-2 text-left">Descrição</th>
                  <th className="px-4 py-2 text-right">Duração</th>
                  <th className="px-4 py-2 text-left">Obs.</th>
                  <th className="px-4 py-2"/>
                </tr>
              </thead>
              <tbody>
                {stoppages.map(s=>(
                  <tr key={s.id} className="border-t table-row">
                    <td className="px-4 py-2.5 font-mono font-bold text-gray-700">{s.stop_code||'—'}</td>
                    <td className="px-4 py-2.5">{s.stop_desc||'—'}</td>
                    <td className="px-4 py-2.5 text-right font-medium">{s.duration_minutes} min</td>
                    <td className="px-4 py-2.5 text-gray-400 text-xs">{s.notes||'—'}</td>
                    <td className="px-4 py-2.5 text-right">
                      <button onClick={()=>setConfirmDel({type:'stop',id:s.id})} className="text-red-400 hover:text-red-600 text-xs">✕</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>

        {/* Weighing (extrusão with has_weighing) */}
        {isExtrusao&&shift.has_weighing===1&&(
          <div className="bg-white rounded-xl shadow-sm overflow-hidden">
            <div className="flex items-center justify-between p-4 border-b">
              <h2 className="font-bold text-gray-900">Pesagem <span className="text-sm font-normal text-gray-400">({weighing.length} rolos · {weighing.reduce((a,w)=>a+(w.weight_kg||0),0).toFixed(2)} kg)</span></h2>
              <Btn size="sm" variant="outline" onClick={()=>setModal('weighing')}>+ Pesagem</Btn>
            </div>
            {weighing.length===0 ? (
              <div className="px-4 py-6 text-center text-gray-400 text-sm">Sem pesagens registadas</div>
            ) : (
              <table className="w-full text-sm">
                <thead className="bg-gray-50 text-xs text-gray-500 uppercase">
                  <tr>
                    <th className="px-4 py-2 text-left">Nº Rolo</th>
                    <th className="px-4 py-2 text-right">Peso (kg)</th>
                    <th className="px-4 py-2 text-left">Obs.</th>
                    <th className="px-4 py-2"/>
                  </tr>
                </thead>
                <tbody>
                  {weighing.map(w=>(
                    <tr key={w.id} className="border-t table-row">
                      <td className="px-4 py-2.5 font-mono font-bold">{w.rolo_number||'—'}</td>
                      <td className="px-4 py-2.5 text-right font-medium">{w.weight_kg}</td>
                      <td className="px-4 py-2.5 text-gray-400 text-xs">{w.notes||'—'}</td>
                      <td className="px-4 py-2.5 text-right">
                        <button onClick={()=>setConfirmDel({type:'weigh',id:w.id})} className="text-red-400 hover:text-red-600 text-xs">✕</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        )}
      </div>

        {/* Order History section */}
        <div className="bg-white rounded-xl shadow-sm overflow-hidden">
          <div className="flex items-center justify-between p-4 border-b cursor-pointer" onClick={()=>{ if(!historyOpen&&shift?.order_id) loadOrderHistory(shift.order_id); setHistoryOpen(h=>!h); }}>
            <h2 className="font-bold text-gray-900">📚 Histórico desta Ordem</h2>
            <span className="text-gray-400 text-sm">{historyOpen?'▲':'▼'}</span>
          </div>
          {historyOpen&&(
            <div>
              {historyLoading?<div className="flex justify-center py-6"><Spinner/></div>:
               orderHistory.length===0?<div className="px-4 py-6 text-center text-gray-400 text-sm">Sem registos anteriores</div>:(
                <div className="overflow-x-auto">
                  <table className="w-full text-sm">
                    <thead className="bg-gray-50 text-xs text-gray-500 uppercase">
                      <tr>
                        <th className="px-3 py-2 text-left">Data</th>
                        <th className="px-3 py-2 text-left">T.</th>
                        <th className="px-3 py-2 text-left">Operador</th>
                        <th className="px-3 py-2 text-left">Máquina</th>
                        {isExtrusao?<>
                          <th className="px-3 py-2 text-right">Rolos</th>
                          <th className="px-3 py-2 text-right">Metros</th>
                        </>:<>
                          <th className="px-3 py-2 text-right">Peças OK</th>
                          <th className="px-3 py-2 text-right">Contador</th>
                        </>}
                        <th className="px-3 py-2 text-right">Rej.</th>
                        <th className="px-3 py-2 text-center">Valid.</th>
                      </tr>
                    </thead>
                    <tbody>
                      {orderHistory.map(e=>(
                        <tr key={e.id} className={`border-t ${e.id===shift?.id?'bg-blue-50':''} ${e.validated?'bg-green-50':''}`}>
                          <td className="px-3 py-2 text-xs text-gray-500">{e.date}</td>
                          <td className="px-3 py-2 text-xs font-bold text-gray-500">T{e.shift_number}</td>
                          <td className="px-3 py-2 text-xs">{e.operator_name}</td>
                          <td className="px-3 py-2 text-xs text-gray-500">{e.machine_name}</td>
                          {isExtrusao?<>
                            <td className="px-3 py-2 text-right">{e.rolls_bundles||0}</td>
                            <td className="px-3 py-2 text-right font-medium">{e.meters_pieces||0}</td>
                          </>:<>
                            <td className="px-3 py-2 text-right font-medium text-green-700">{e.pieces_ok||0}</td>
                            <td className="px-3 py-2 text-right">{e.counter||'—'}</td>
                          </>}
                          <td className="px-3 py-2 text-right text-red-500">{e.rejected||e.pieces_rejected||0}</td>
                          <td className="px-3 py-2 text-center">{e.validated?<span className="text-green-600 text-xs font-bold">✓</span>:<span className="text-gray-300 text-xs">—</span>}</td>
                        </tr>
                      ))}
                    </tbody>
                    <tfoot className="bg-gray-50 font-bold text-sm border-t">
                      <tr>
                        <td className="px-3 py-2" colSpan={4}>Total da ordem</td>
                        {isExtrusao?<>
                          <td className="px-3 py-2 text-right">{orderHistory.reduce((a,e)=>a+(Number(e.rolls_bundles)||0),0)}</td>
                          <td className="px-3 py-2 text-right">{orderHistory.reduce((a,e)=>a+(Number(e.meters_pieces)||0),0).toFixed(1)}</td>
                        </>:<>
                          <td className="px-3 py-2 text-right text-green-700">{orderHistory.reduce((a,e)=>a+(Number(e.pieces_ok)||0),0)}</td>
                          <td className="px-3 py-2 text-right">{orderHistory.reduce((a,e)=>a+(Number(e.counter)||0),0)}</td>
                        </>}
                        <td className="px-3 py-2 text-right text-red-500">{orderHistory.reduce((a,e)=>a+(Number(e.rejected)||Number(e.pieces_rejected)||0),0)}</td>
                        <td/>
                      </tr>
                    </tfoot>
                  </table>
                </div>
              )}
            </div>
          )}
        </div>
      </div>

      {/* Modals */}
      <AddEntryModal open={modal==='entry'} onClose={()=>setModal(null)} shift={shift} colors={colors} isExtrusao={isExtrusao} onSave={async(d)=>{ const res=await api.post('/api/production-entries',{shift_id:shift.id,...d}); await refresh(); return res; }}/>
      <AddStoppageModal open={modal==='stoppage'} onClose={()=>setModal(null)} codes={codes} onSave={async(d)=>{ await api.post('/api/stoppages',{shift_id:shift.id,...d}); await refresh(); setModal(null); }}/>
      {isExtrusao&&shift.has_weighing===1&&<AddWeighingModal open={modal==='weighing'} onClose={()=>setModal(null)} weighing={weighing} onSave={async(d)=>{ await api.post('/api/weighing',{shift_id:shift.id,...d}); await refresh(); setModal(null); }}/>}
      <ConfirmModal open={modal==='close'} onClose={()=>setModal(null)} onConfirm={closeShift} title="Fechar turno" message="Confirmar o fecho do turno? Esta ação não pode ser desfeita." variant="danger"/>
      <PalletCodeModal open={!!palletEntry} onClose={()=>setPalletEntry(null)} entry={palletEntry} shift={shift}/>
      <ConfirmModal open={!!confirmDel} onClose={()=>setConfirmDel(null)} onConfirm={execDel} title="Apagar registo" message="Tem a certeza? Esta ação não pode ser desfeita." variant="danger"/>
    </div>
  );
}

function PalletCodeModal({open,onClose,entry,shift}) {
  if(!open||!entry||!shift) return null;
  // Usa created_at do registo (data real) em vez de new Date()
  const d = entry.created_at ? new Date(entry.created_at) : new Date();
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yy = String(d.getFullYear()).slice(2);
  const opNum = String(shift.operator_number||'000').padStart(3,'0');
  const code = `T${shift.shift_number}-${dd}${mm}${yy}-${opNum}-${String(entry.id).padStart(4,'0')}`;
  return (
    <Modal open={open} onClose={onClose} title="Código de Palete" size="sm">
      <div className="text-center py-2">
        <div className="bg-gray-900 text-green-400 rounded-xl p-6 font-mono mb-4">
          <div className="text-xs text-gray-500 mb-2 uppercase tracking-widest">Código de Palete</div>
          <div className="text-3xl font-extrabold tracking-widest">{code}</div>
        </div>
        <div className="text-left bg-gray-50 rounded-xl p-4 text-sm space-y-1.5 mb-4">
          <div className="flex justify-between"><span className="text-gray-500">Produto:</span><span className="font-semibold">{shift.ref_name||shift.ref_code||'—'}</span></div>
          <div className="flex justify-between"><span className="text-gray-500">Ref.:</span><span className="font-mono text-xs">{shift.ref_code||'—'}</span></div>
          <div className="flex justify-between"><span className="text-gray-500">Data:</span><span>{dd}/{mm}/{yy}</span></div>
          <div className="flex justify-between"><span className="text-gray-500">Turno:</span><span>{SHIFTS[shift.shift_number]}</span></div>
          <div className="flex justify-between"><span className="text-gray-500">Operador:</span><span>{shift.operator_name} (#{shift.operator_number})</span></div>
          {entry.pieces_ok>0&&<div className="flex justify-between"><span className="text-gray-500">Peças OK:</span><span className="font-bold text-green-700">{entry.pieces_ok}</span></div>}
          {entry.meters_pieces>0&&<div className="flex justify-between"><span className="text-gray-500">Metros/Peças:</span><span className="font-bold">{entry.meters_pieces}</span></div>}
        </div>
        <p className="text-xs text-gray-400 mb-4">Escreva este código na etiqueta da palete</p>
        <Btn className="w-full" onClick={onClose}>Fechar</Btn>
      </div>
    </Modal>
  );
}

function AddEntryModal({open,onClose,shift,colors,isExtrusao,onSave}) {
  const emptyForm = {color:'',rolls_bundles:'',meters_pieces:'',rejected:'',active_cavities:'',counter:'',pieces_ok:'',pieces_rejected:'',finishing:'',start_time:'',end_time:'',notes:''};
  const [form,setForm] = useState(emptyForm);
  const [loading,setLoading] = useState(false);
  const [errors,setErrors] = useState({});
  const [savedEntry,setSavedEntry] = useState(null);
  const set = (k,v) => { setForm(f=>({...f,[k]:v})); setErrors(e=>({...e,[k]:false})); };

  const validate = () => {
    const e = {};
    if(!form.start_time) e.start_time = true;
    if(!form.end_time) e.end_time = true;
    if(!isExtrusao) {
      if(form.pieces_ok==='') e.pieces_ok = true;
      if(form.pieces_rejected==='') e.pieces_rejected = true;
      if(form.counter==='') e.counter = true;
    } else {
      if(form.rolls_bundles==='') e.rolls_bundles = true;
      if(form.meters_pieces==='') e.meters_pieces = true;
    }
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const submit = async () => {
    if(!validate()) return;
    setLoading(true);
    try {
      const res = await onSave({...form,rolls_bundles:Number(form.rolls_bundles)||0,meters_pieces:Number(form.meters_pieces)||0,rejected:Number(form.rejected)||0,active_cavities:Number(form.active_cavities)||null,counter:Number(form.counter)||0,pieces_ok:Number(form.pieces_ok)||0,pieces_rejected:Number(form.pieces_rejected)||0});
      setSavedEntry(res);
      setForm(emptyForm);
      setErrors({});
    } finally{ setLoading(false); }
  };

  const inp = (err) => `w-full px-3 py-2.5 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 ${err?'border-red-400 bg-red-50':'border-gray-300'}`;

  return (
    <>
    <Modal open={open&&!savedEntry} onClose={onClose} title="Registar Produção">
      <div className="space-y-4">
        {isExtrusao ? <>
          <Select label="Cor" value={form.color} onChange={e=>set('color',e.target.value)} placeholder="— selecionar cor —" options={colors.map(c=>({value:c.name,label:`${c.code} — ${c.name}`}))}/>
          <div className="grid grid-cols-2 gap-3">
            <Field label="Rolos / Atados" required><input type="number" min="0" step="1" value={form.rolls_bundles} onChange={e=>set('rolls_bundles',e.target.value)} placeholder="0" className={inp(errors.rolls_bundles)}/></Field>
            <Field label="Metros / Peças" required><input type="number" min="0" step="0.1" value={form.meters_pieces} onChange={e=>set('meters_pieces',e.target.value)} placeholder="0" className={inp(errors.meters_pieces)}/></Field>
          </div>
          <Input label="Rejeitados" type="number" min="0" value={form.rejected} onChange={e=>set('rejected',e.target.value)} placeholder="0"/>
        </> : <>
          <div className="grid grid-cols-2 gap-3">
            <Input label="Cavidades Ativas" type="number" min="0" value={form.active_cavities} onChange={e=>set('active_cavities',e.target.value)} placeholder="0"/>
            <Field label="Contador" required><input type="number" min="0" value={form.counter} onChange={e=>set('counter',e.target.value)} placeholder="0" className={inp(errors.counter)}/></Field>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <Field label="Peças OK" required><input type="number" min="0" value={form.pieces_ok} onChange={e=>set('pieces_ok',e.target.value)} placeholder="0" className={inp(errors.pieces_ok)}/></Field>
            <Field label="Rejeitadas" required><input type="number" min="0" value={form.pieces_rejected} onChange={e=>set('pieces_rejected',e.target.value)} placeholder="0" className={inp(errors.pieces_rejected)}/></Field>
          </div>
          <div>
            <div className="text-sm font-semibold text-gray-700 mb-2">Acabamentos</div>
            <div className="flex gap-3">
              <button onClick={()=>set('finishing', form.finishing==='sim'?'':'sim')}
                className={`flex-1 py-2.5 rounded-xl text-sm font-bold border-2 transition-colors ${form.finishing==='sim'?'bg-green-500 border-green-500 text-white':'border-gray-200 text-gray-700 hover:border-green-400'}`}>✔ Sim</button>
              <button onClick={()=>set('finishing', form.finishing==='nao'?'':'nao')}
                className={`flex-1 py-2.5 rounded-xl text-sm font-bold border-2 transition-colors ${form.finishing==='nao'?'bg-red-500 border-red-500 text-white':'border-gray-200 text-gray-700 hover:border-red-400'}`}>✕ Não</button>
            </div>
          </div>
        </>}
        <div className="grid grid-cols-2 gap-3">
          <Field label="Hora Início" required><input type="time" value={form.start_time} onChange={e=>set('start_time',e.target.value)} className={inp(errors.start_time)}/></Field>
          <Field label="Hora Fim" required><input type="time" value={form.end_time} onChange={e=>set('end_time',e.target.value)} className={inp(errors.end_time)}/></Field>
        </div>
        {Object.keys(errors).length>0&&<Alert type="error">Preencha os campos obrigatórios assinalados.</Alert>}
        <Input label="Observações" value={form.notes} onChange={e=>set('notes',e.target.value)} placeholder="Opcional"/>
        <div className="flex gap-3 justify-end pt-2">
          <Btn variant="outline" onClick={onClose}>Cancelar</Btn>
          <Btn onClick={submit} disabled={loading}>{loading?'A guardar…':'Guardar'}</Btn>
        </div>
      </div>
    </Modal>
    <PalletCodeModal open={!!savedEntry} onClose={()=>{ setSavedEntry(null); onClose(); }} entry={savedEntry} shift={shift}/>
    </>
  );
}

function AddStoppageModal({open,onClose,codes,onSave}) {
  const [form,setForm] = useState({stoppage_code_id:'',duration_minutes:'',notes:''});
  const [loading,setLoading] = useState(false);
  const submit = async () => {
    if(!form.stoppage_code_id||!form.duration_minutes) return;
    setLoading(true);
    try { await onSave({...form,duration_minutes:Number(form.duration_minutes)}); setForm({stoppage_code_id:'',duration_minutes:'',notes:''}); }
    finally{ setLoading(false); }
  };
  return (
    <Modal open={open} onClose={onClose} title="Registar Paragem">
      <div className="space-y-4">
        <Select label="Motivo de Paragem" required value={form.stoppage_code_id} onChange={e=>setForm(f=>({...f,stoppage_code_id:e.target.value}))} placeholder="— selecionar motivo —"
          options={codes.map(c=>({value:c.id,label:`${c.code} — ${c.description}`}))}/>
        <Input label="Duração (minutos)" required type="number" min="1" value={form.duration_minutes} onChange={e=>setForm(f=>({...f,duration_minutes:e.target.value}))} placeholder="ex: 15"/>
        <Input label="Observações" value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Opcional"/>
        <div className="flex gap-3 justify-end pt-2">
          <Btn variant="outline" onClick={onClose}>Cancelar</Btn>
          <Btn onClick={submit} disabled={loading||!form.stoppage_code_id||!form.duration_minutes}>{loading?'A guardar…':'Guardar'}</Btn>
        </div>
      </div>
    </Modal>
  );
}

function AddWeighingModal({open,onClose,weighing,onSave}) {
  const [form,setForm] = useState({rolo_number:'',weight_kg:'',notes:''});
  const [loading,setLoading] = useState(false);
  const nextRolo = weighing.length>0 ? Math.max(...weighing.map(w=>w.rolo_number||0))+1 : 1;
  const submit = async () => {
    if(!form.weight_kg) return;
    setLoading(true);
    try { await onSave({rolo_number:Number(form.rolo_number)||nextRolo,weight_kg:Number(form.weight_kg),notes:form.notes}); setForm({rolo_number:'',weight_kg:'',notes:''}); }
    finally{ setLoading(false); }
  };
  return (
    <Modal open={open} onClose={onClose} title="Registar Pesagem">
      <div className="space-y-4">
        <div className="grid grid-cols-2 gap-3">
          <Input label="Nº Rolo" type="number" min="1" value={form.rolo_number} onChange={e=>setForm(f=>({...f,rolo_number:e.target.value}))} placeholder={String(nextRolo)}/>
          <Input label="Peso (kg)" required type="number" min="0" step="0.001" value={form.weight_kg} onChange={e=>setForm(f=>({...f,weight_kg:e.target.value}))} placeholder="0.000" autoFocus/>
        </div>
        <Input label="Observações" value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Opcional"/>
        <div className="flex gap-3 justify-end pt-2">
          <Btn variant="outline" onClick={onClose}>Cancelar</Btn>
          <Btn onClick={submit} disabled={loading||!form.weight_kg}>{loading?'A guardar…':'Guardar'}</Btn>
        </div>
      </div>
    </Modal>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard() {
  const [data,setData] = useState(null);
  const chartRef1 = useRef(null);
  const chartRef2 = useRef(null);
  const chart1 = useRef(null);
  const chart2 = useRef(null);

  useEffect(()=>{ api.get('/api/dashboard').then(setData).catch(()=>{}); },[]);

  useEffect(()=>{
    if(!data||!chartRef1.current) return;
    if(chart1.current) chart1.current.destroy();
    const labels = data.daily.map(d=>d.date.slice(5));
    chart1.current = new Chart(chartRef1.current, {
      type:'bar',
      data:{ labels, datasets:[
        {label:'Extrusão (metros)',data:data.daily.map(d=>d.ext_meters||0),backgroundColor:'rgba(37,99,235,.7)',borderRadius:4},
        {label:'Injeção (peças OK)',data:data.daily.map(d=>d.inj_pieces||0),backgroundColor:'rgba(234,88,12,.7)',borderRadius:4},
      ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top'}},scales:{y:{beginAtZero:true}}}
    });
  },[data,chartRef1.current]);

  useEffect(()=>{
    if(!data||!data.stopCats?.length||!chartRef2.current) return;
    if(chart2.current) chart2.current.destroy();
    const colors = ['#EF4444','#F97316','#FBBF24','#22C55E','#3B82F6','#8B5CF6'];
    chart2.current = new Chart(chartRef2.current, {
      type:'doughnut',
      data:{labels:data.stopCats.map(s=>s.category),datasets:[{data:data.stopCats.map(s=>s.total_min),backgroundColor:colors}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right'}}}
    });
  },[data,chartRef2.current]);

  if(!data) return <div className="flex justify-center py-20"><Spinner/></div>;
  const p = data.todayProd||{};
  const s = data.todayStops||{};
  return (
    <div className="space-y-6">
      <div className="flex items-center justify-between">
        <h1 className="text-2xl font-bold text-gray-900">Dashboard</h1>
        <span className="text-sm text-gray-400">{new Date().toLocaleDateString('pt-PT',{weekday:'long',day:'numeric',month:'long'})}</span>
      </div>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
        <KpiCard label="Turnos hoje" value={p.shift_count||0} color="blue"/>
        <KpiCard label="Metros extrusão" value={(p.total_meters||0).toFixed(0)} color="blue"/>
        <KpiCard label="Peças injeção" value={p.total_pieces_ok||0} color="green"/>
        <KpiCard label="Paragens hoje" value={`${s.total_min||0} min`} sub={`${s.count||0} ocorrências`} color="amber"/>
      </div>

      {/* Machine status */}
      <div className="bg-white rounded-xl shadow-sm overflow-hidden">
        <div className="p-4 border-b font-bold text-gray-900">Estado das Máquinas</div>
        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3 p-4">
          {data.machines.map(m=>(
            <div key={m.id} className={`rounded-lg p-3 border-2 ${m.shift_id?'border-green-300 bg-green-50':'border-gray-200 bg-gray-50'}`}>
              <div className="flex items-center justify-between mb-1">
                <span className="font-bold text-gray-800 text-sm">{m.name}</span>
                <span className={`w-2.5 h-2.5 rounded-full ${m.shift_id?'bg-green-500':'bg-gray-300'}`}/>
              </div>
              {m.shift_id ? <>
                <div className="text-xs text-gray-600">{m.operator_name}</div>
                <div className="text-xs text-gray-500">{m.order_number} · {SHIFTS[m.shift_number]}</div>
              </> : <div className="text-xs text-gray-400">Sem turno ativo</div>}
            </div>
          ))}
        </div>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div className="bg-white rounded-xl shadow-sm p-4">
          <div className="font-bold text-gray-900 mb-3">Produção — Últimos 7 dias</div>
          <div className="chart-container"><canvas ref={chartRef1}/></div>
        </div>
        <div className="bg-white rounded-xl shadow-sm p-4">
          <div className="font-bold text-gray-900 mb-3">Paragens por categoria (7 dias)</div>
          <div className="chart-container"><canvas ref={chartRef2}/></div>
        </div>
      </div>

      {data.topStops.length>0&&(
        <div className="bg-white rounded-xl shadow-sm overflow-hidden">
          <div className="p-4 border-b font-bold text-gray-900">Top Paragens (7 dias)</div>
          <table className="w-full text-sm">
            <thead className="bg-gray-50 text-xs text-gray-500 uppercase">
              <tr><th className="px-4 py-2 text-left">Código</th><th className="px-4 py-2 text-left">Descrição</th><th className="px-4 py-2 text-left">Categoria</th><th className="px-4 py-2 text-right">Ocorrências</th><th className="px-4 py-2 text-right">Tempo total</th></tr>
            </thead>
            <tbody>
              {data.topStops.map(s=>(
                <tr key={s.code} className="border-t table-row">
                  <td className="px-4 py-2.5 font-mono font-bold">{s.code}</td>
                  <td className="px-4 py-2.5">{s.description}</td>
                  <td className="px-4 py-2.5 text-gray-500">{s.category}</td>
                  <td className="px-4 py-2.5 text-right">{s.cnt}</td>
                  <td className="px-4 py-2.5 text-right font-medium">{s.total_min} min</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ─── CRUD TABLE HELPER ────────────────────────────────────────────────────────
function CrudPage({title,icon,cols,data,onAdd,onEdit,onDelete,loading}) {
  const [confirmDel,setConfirmDel] = useState(null);
  const [delErr,setDelErr] = useState('');
  const execDel = async()=>{
    setDelErr('');
    try{ await onDelete(confirmDel.id); setConfirmDel(null); }
    catch(e){ setDelErr(e.message); }
  };
  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between">
        <h1 className="text-2xl font-bold text-gray-900">{icon} {title}</h1>
        <Btn onClick={onAdd}>+ Novo</Btn>
      </div>
      <div className="bg-white rounded-xl shadow-sm overflow-hidden">
        {loading?<div className="flex justify-center py-12"><Spinner/></div>:
         data.length===0?<EmptyState title="Sem registos" desc="Clique em Novo para adicionar"/>:(
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-gray-50 text-xs text-gray-500 uppercase">
                <tr>{cols.map(c=><th key={c.key} className={`px-4 py-2.5 ${c.right?'text-right':'text-left'}`}>{c.label}</th>)}<th className="px-4 py-2.5"/></tr>
              </thead>
              <tbody>
                {data.map((row,i)=>(
                  <tr key={row.id||i} className="border-t table-row">
                    {cols.map(c=><td key={c.key} className={`px-4 py-2.5 ${c.right?'text-right':''} ${c.cls?c.cls(row):''}`}>{c.render?c.render(row):row[c.key]??'—'}</td>)}
                    <td className="px-4 py-2.5 text-right flex items-center justify-end gap-2">
                      <Btn size="sm" variant="outline" onClick={()=>onEdit(row)}>Editar</Btn>
                      {onDelete&&<button onClick={()=>{setDelErr('');setConfirmDel(row);}} className="text-red-400 hover:text-red-600 px-2 py-1 rounded text-xs font-medium hover:bg-red-50 transition-colors" title="Eliminar">🗑</button>}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>

function OrderForm({open,onClose,onSave,editing,refs,colors,machines,orders}) {
  const empty = {order_number:'',reference_id:'',color_id:'',machine_id:'',quantity:'',unit:'pecas',cycle_time_seconds:'',mp_phases:[],notes:'',status:'active'};
  const [form,setForm] = useState(empty);
  const [loading,setLoading] = useState(false);
  const [phases,setPhases] = useState([{phase:1,quantity:''}]);

  useEffect(()=>{
    if(editing){ setForm({...editing,mp_phases:undefined}); try{setPhases(JSON.parse(editing.mp_phases)||[{phase:1,quantity:''}]);}catch{setPhases([{phase:1,quantity:''}]);} }
    else{ setForm(empty); setPhases([{phase:1,quantity:''}]); }
  },[editing,open]);

  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const setPhase = (i,v) => { const p=[...phases]; p[i]={...p[i],quantity:v}; setPhases(p); };

  const selectedMachine = machines.find(m=>String(m.id)===String(form.machine_id));
  const machineType = selectedMachine?.type;

  const handleMachineChange = (machineId) => {
    const machine = machines.find(m=>String(m.id)===String(machineId));
    if (!machine || editing) { set('machine_id', machineId); return; }
    const prefix = machine.type === 'extrusao' ? 'EXT' : 'INJ';
    const year = new Date().getFullYear();
    const existing = (orders||[]).filter(o=>o.order_number&&o.order_number.startsWith(`${prefix}-${year}-`));
    const maxNum = existing.reduce((max,o)=>{ const n=parseInt((o.order_number.split('-')[2])||'0'); return Math.max(max,n); },0);
    const nextNum = String(maxNum+1).padStart(3,'0');
    const newUnit = machine.type==='injecao' ? 'pecas' : form.unit;
    setForm(f=>({...f, machine_id:machineId, order_number:`${prefix}-${year}-${nextNum}`, unit:newUnit}));
  };
  const addPhase = () => phases.length<10&&setPhases(p=>[...p,{phase:p.length+1,quantity:''}]);
  const delPhase = (i) => setPhases(p=>p.filter((_,j)=>j!==i).map((x,j)=>({...x,phase:j+1})));

  const [formErr,setFormErr] = useState('');
  const submit = async () => {
    setFormErr(''); setLoading(true);
    try{ await onSave({...form,quantity:Number(form.quantity)||null,reference_id:form.reference_id||null,color_id:form.color_id||null,machine_id:form.machine_id||null,mp_phases:phases.filter(p=>p.quantity).map(p=>({phase:p.phase,quantity:Number(p.quantity)})) }); }
    catch(e){ setFormErr(e.message); }
    finally{ setLoading(false); }
  };

  return (
    <Modal open={open} onClose={onClose} title={editing?'Editar Ordem':'Nova Ordem de Produção'} size="lg">
      <div className="space-y-4">
        <div className="grid grid-cols-2 gap-3">
          <Input label="Nº Ordem" required value={form.order_number} onChange={e=>set('order_number',e.target.value)} placeholder="ex: OP-2024-001"/>
          <Select label="Estado" value={form.status} onChange={e=>set('status',e.target.value)} options={[{value:'active',label:'Ativa'},{value:'pending',label:'Pendente'},{value:'completed',label:'Concluída'},{value:'cancelled',label:'Cancelada'}]}/>
        </div>
        <div className="grid grid-cols-2 gap-3">
          <Select label="Referência" value={form.reference_id||''} onChange={e=>set('reference_id',e.target.value)} placeholder="— selecionar —" options={refs.map(r=>({value:r.id,label:`${r.code} — ${r.name}`}))}/>
          <Select label="Cor" value={form.color_id||''} onChange={e=>set('color_id',e.target.value)} placeholder="— selecionar —" options={colors.map(c=>({value:c.id,label:`${c.code} — ${c.name}`}))}/>
        </div>
        <div className="grid grid-cols-2 gap-3">
          <Select label="Máquina" value={form.machine_id||''} onChange={e=>handleMachineChange(e.target.value)} placeholder="— selecionar —" options={machines.map(m=>({value:m.id,label:m.name}))}/>
          <div className="grid grid-cols-2 gap-2">
            <Input label="Quantidade" type="number" min="0" value={form.quantity} onChange={e=>set('quantity',e.target.value)}/>
            <Select label="Unidade" value={form.unit} onChange={e=>set('unit',e.target.value)} options={machineType==='injecao' ? [{value:'pecas',label:'Peças'}] : [{value:'pecas',label:'Peças'},{value:'metros',label:'Metros'},{value:'atados',label:'Atados'}]}/>
          </div>
        </div>
        <div className="grid grid-cols-2 gap-3">
          <div>
            <Input label="Ciclo (segundos)" type="number" min="0" step="0.1" value={form.cycle_time_seconds||''} onChange={e=>set('cycle_time_seconds',e.target.value)} placeholder="ex: 30"/>
            <p className="text-xs text-gray-400 mt-1">Tempo de ciclo da máquina para cálculo de eficiência</p>
          </div>
        </div>
        {/* MP Phases */}
        <div>
          <div className="flex items-center justify-between mb-2">
            <label className="text-sm font-semibold text-gray-700">MP Dispensada por Fases</label>
            {phases.length<10&&<button onClick={addPhase} className="text-blue-600 text-xs hover:underline">+ Fase</button>}
          </div>
          <div className="space-y-2 max-h-40 overflow-y-auto">
            {phases.map((p,i)=>(
              <div key={i} className="flex items-center gap-2">
                <span className="text-xs text-gray-400 w-14">Fase {p.phase}</span>
                <input type="number" min="0" step="0.1" value={p.quantity} onChange={e=>setPhase(i,e.target.value)} placeholder="kg" className="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                {phases.length>1&&<button onClick={()=>delPhase(i)} className="text-red-400 hover:text-red-600 text-xs px-2">✕</button>}
              </div>
            ))}
          </div>
        </div>
        <Textarea label="Observações" value={form.notes||''} onChange={e=>set('notes',e.target.value)}/>
        {formErr&&<div className="bg-red-50 border border-red-200 text-red-700 rounded-lg px-3 py-2 text-sm">{formErr}</div>}
        {formErr&&<div className="bg-red-50 border border-red-200 text-red-700 rounded-lg px-3 py-2 text-sm">{formErr}</div>}
        <div className="flex gap-3 justify-end pt-2 border-t">
          <Btn variant="outline" onClick={onClose}>Cancelar</Btn>
          <Btn onClick={submit} disabled={loading||!form.order_number}>{loading?'A guardar…':'Guardar'}</Btn>
        </div>
      </div>
    </Modal>
  );
}

// ─── HELPER: CÓDIGO DE PALETE ─────────────────────────────────────────────────
function buildPalletCode(entry, shift) {
  const d = entry && entry.created_at ? new Date(entry.created_at) : new Date();
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yy = String(d.getFullYear()).slice(2);
  const opNum = String(shift.operator_number||'000').padStart(3,'0');
  return `T${shift.shift_number}-${dd}${mm}${yy}-${opNum}-${String(entry.id).padStart(4,'0')}`;
}

  if(!open||!entry||!shift) return null;

  const d = entry.created_at ? new Date(entry.created_at) : new Date();
  const dd = String(d.getDate()).padStart(2,'0');

  const yy = String(d.getFullYear()).slice(2);
  return (
    <Modal open={open} onClose={onClose} title="Código de Palete" size="sm">

          <div className="flex justify-between"><span className="text-gray-500">Produto:</span><span className="font-semibold">{shift.ref_name||shift.ref_code||'—'}</span></div>

          <div className="flex justify-between"><span className="text-gray-500">Data:</span><span>{dd}/{mm}/{yy}</span></div>
          <div className="flex justify-between"><span className="text-gray-500">Turno:</span><span>{SHIFTS[shift.shift_number]}</span></div>
          <div className="flex justify-between"><span className="text-gray-500">Operador:</span><span>{shift.operator_name} (#{shift.operator_number})</span></div>
