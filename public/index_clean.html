                              <button onClick={()=>startEdit(e,shift)} className="text-blue-500 hover:text-blue-700 text-xs" title="Editar">✏️</button>
                            </div>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          ))
        ))}
      </div>

      {/* Edit modal */}
      {editing&&(
        <Modal open={!!editing} onClose={()=>setEditing(null)} title="Editar Registo" size="md">
          <div className="space-y-4">
            {isExtrusao(editing.shift)?<>
              <div className="grid grid-cols-2 gap-3">
                <Input label="Rolos/Atados" type="number" min="0" value={editForm.rolls_bundles} onChange={e=>setEditForm(f=>({...f,rolls_bundles:e.target.value}))}/>
                <Input label="Metros/Peças" type="number" min="0" step="0.1" value={editForm.meters_pieces} onChange={e=>setEditForm(f=>({...f,meters_pieces:e.target.value}))}/>
              </div>
              <Input label="Rejeitados" type="number" min="0" value={editForm.rejected} onChange={e=>setEditForm(f=>({...f,rejected:e.target.value}))}/>
            </>:<>
              <div className="grid grid-cols-2 gap-3">
                <Input label="Cavidades Ativas" type="number" min="0" value={editForm.active_cavities} onChange={e=>setEditForm(f=>({...f,active_cavities:e.target.value}))}/>
                <Input label="Contador" type="number" min="0" value={editForm.counter} onChange={e=>setEditForm(f=>({...f,counter:e.target.value}))}/>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <Input label="Peças OK" type="number" min="0" value={editForm.pieces_ok} onChange={e=>setEditForm(f=>({...f,pieces_ok:e.target.value}))}/>
                <Input label="Peças Rejeitadas" type="number" min="0" value={editForm.pieces_rejected} onChange={e=>setEditForm(f=>({...f,pieces_rejected:e.target.value}))}/>
              </div>
            </>}
            <div className="grid grid-cols-2 gap-3">
              <Input label="Hora Início" type="time" value={editForm.start_time} onChange={e=>setEditForm(f=>({...f,start_time:e.target.value}))}/>
              <Input label="Hora Fim" type="time" value={editForm.end_time} onChange={e=>setEditForm(f=>({...f,end_time:e.target.value}))}/>
            </div>
            <Input label="Observações" value={editForm.notes} onChange={e=>setEditForm(f=>({...f,notes:e.target.value}))}/>
            <div className="flex gap-3 justify-end pt-2 border-t">
              <Btn variant="outline" onClick={()=>setEditing(null)}>Cancelar</Btn>
              <Btn onClick={saveEdit} disabled={saving}>{saving?'A guardar…':'Guardar'}</Btn>
            </div>
          </div>
        </Modal>
      )}

      {/* Correction panel */}
      {correcting&&(
        <Modal open={!!correcting} onClose={()=>setCorrecting(null)} title="✗ Corrigir Registo" size="lg">
          <div className="space-y-4">
            {/* Side-by-side: original vs correction */}
            <div className="grid grid-cols-2 gap-4">
              <div className="bg-amber-50 border border-amber-200 rounded-xl p-3">
                <div className="text-xs font-bold text-amber-700 uppercase tracking-widest mb-2">📋 O que o operador inseriu</div>
                {correcting.isExt?(
                  <div className="space-y-1 text-sm">
                    <div className="flex justify-between"><span className="text-gray-500">Rolos/Atados:</span><span className="font-bold">{correcting.entry.rolls_bundles||0}</span></div>
                    <div className="flex justify-between"><span className="text-gray-500">Metros/Peças:</span><span className="font-bold">{correcting.entry.meters_pieces||0}</span></div>
                    <div className="flex justify-between"><span className="text-gray-500">Rejeitados:</span><span className="font-bold text-red-600">{correcting.entry.rejected||0}</span></div>
                  </div>
                ):(
                  <div className="space-y-1 text-sm">
                    <div className="flex justify-between"><span className="text-gray-500">Peças OK:</span><span className="font-bold text-green-700">{correcting.entry.pieces_ok||0}</span></div>
                    <div className="flex justify-between"><span className="text-gray-500">Contador:</span><span className="font-bold">{correcting.entry.counter||'—'}</span></div>
                    <div className="flex justify-between"><span className="text-gray-500">Cav. Ativas:</span><span className="font-bold">{correcting.entry.active_cavities||'—'}</span></div>
                    <div className="flex justify-between"><span className="text-gray-500">Peças Rej.:</span><span className="font-bold text-red-600">{correcting.entry.pieces_rejected||0}</span></div>
                  </div>
                )}
                <div className="mt-2 pt-2 border-t border-amber-200 space-y-1 text-sm">
                  <div className="flex justify-between"><span className="text-gray-500">Início:</span><span>{correcting.entry.start_time||'—'}</span></div>
                  <div className="flex justify-between"><span className="text-gray-500">Fim:</span><span>{correcting.entry.end_time||'—'}</span></div>
                </div>
                <div className="mt-2 text-xs text-amber-600">Operador: {correcting.shift.operator_name} — {correcting.shift.date}</div>
              </div>
              <div>
                <div className="text-xs font-bold text-blue-700 uppercase tracking-widest mb-2">✏️ Valores corrigidos</div>
                {correcting.isExt?(
                  <div className="space-y-2">
                    <div className="grid grid-cols-2 gap-2">
                      <Input label="Rolos/Atados" type="number" min="0" value={corrForm.rolls_bundles} onChange={e=>setCorrForm(f=>({...f,rolls_bundles:e.target.value}))}/>
                      <Input label="Metros/Peças" type="number" min="0" step="0.1" value={corrForm.meters_pieces} onChange={e=>setCorrForm(f=>({...f,meters_pieces:e.target.value}))}/>
                    </div>
                    <Input label="Rejeitados" type="number" min="0" value={corrForm.rejected} onChange={e=>setCorrForm(f=>({...f,rejected:e.target.value}))}/>
                  </div>
                ):(
                  <div className="space-y-2">
                    <div className="grid grid-cols-2 gap-2">
                      <Input label="Peças OK" type="number" min="0" value={corrForm.pieces_ok} onChange={e=>setCorrForm(f=>({...f,pieces_ok:e.target.value}))}/>
                      <Input label="Contador" type="number" min="0" value={corrForm.counter} onChange={e=>setCorrForm(f=>({...f,counter:e.target.value}))}/>
                    </div>
                    <div className="grid grid-cols-2 gap-2">
                      <Input label="Cav. Ativas" type="number" min="0" value={corrForm.active_cavities} onChange={e=>setCorrForm(f=>({...f,active_cavities:e.target.value}))}/>
                      <Input label="Peças Rej." type="number" min="0" value={corrForm.pieces_rejected} onChange={e=>setCorrForm(f=>({...f,pieces_rejected:e.target.value}))}/>
                    </div>
                  </div>
                )}
                <div className="grid grid-cols-2 gap-2 mt-2">
                  <Input label="Hora Início" type="time" value={corrForm.start_time} onChange={e=>setCorrForm(f=>({...f,start_time:e.target.value}))}/>
                  <Input label="Hora Fim" type="time" value={corrForm.end_time} onChange={e=>setCorrForm(f=>({...f,end_time:e.target.value}))}/>
                </div>
              </div>
            </div>
            <div>
              <label className="block text-sm font-semibold text-gray-700 mb-1">Motivo da correção</label>
              <textarea value={corrNotes} onChange={e=>setCorrNotes(e.target.value)} rows={2}
                className="w-full border-2 border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-purple-400"
                placeholder="Descreva o motivo da correção…"/>
            </div>
            <div className="flex gap-3 justify-end pt-2 border-t">
              <Btn variant="outline" onClick={()=>setCorrecting(null)}>Cancelar</Btn>
              <Btn onClick={saveCorrection} disabled={corrSaving} variant="primary">{corrSaving?'A guardar…':'Guardar Correção e Validar ✓'}</Btn>
            </div>
          </div>
        </Modal>
      )}

      {/* Pallet code modal */}
      <PalletCodeModalV2 open={!!palletData} onClose={()=>setPalletData(null)} entry={palletData?.entry} shift={palletData?.shift}/>
    </div>
  );
}

// ─── REPORTS PAGE ─────────────────────────────────────────────────────────────
function ReportsPage() {
  const [rows,setRows] = useState([]);
  const [loading,setLoading] = useState(false);
  const [error,setError] = useState('');
  const [refs,setRefs] = useState([]);
  const [machines,setMachines] = useState([]);
  const [filters,setFilters] = useState({
    date_from: new Date(Date.now()-7*24*60*60*1000).toISOString().slice(0,10),
    date_to:   new Date().toISOString().slice(0,10),
    machine_id:'',
    reference_id:''
  });
  const [shiftDetail,setShiftDetail] = useState(null);
  const [editEntry,setEditEntry] = useState(null); // {entry, isExtrusao}
  const [editForm,setEditForm] = useState({});
  const [editErr,setEditErr] = useState('');
  const [editLoading,setEditLoading] = useState(false);
  const [delEntryId,setDelEntryId] = useState(null);

  useEffect(()=>{
    Promise.all([api.get('/api/references'),api.get('/api/machines')])
      .then(([r,m])=>{ setRefs(r); setMachines(m); })
      .catch(()=>{});
  },[]);

  const refreshShift = async () => {
    if(!shiftDetail) return;
    const d = await api.get(`/api/shifts/${shiftDetail.id}`);
    setShiftDetail(d);
  };

  const saveEditEntry = async () => {
    setEditLoading(true); setEditErr('');
    try {
      await api.put(`/api/production-entries/${editEntry.entry.id}`, editForm);
      setEditEntry(null);
      await refreshShift();
    } catch(e){ setEditErr(e.message); }
    finally{ setEditLoading(false); }
  };

  const doDelEntry = async () => {
    try {
      await api.del(`/api/production-entries/${delEntryId}`);
      setDelEntryId(null);
      await refreshShift();
    } catch(e){ setError(e.message); }
  };

  const load = async () => {
    setLoading(true); setError('');
    try {
      const p = new URLSearchParams();
      if(filters.date_from)    p.set('date_from',filters.date_from);
      if(filters.date_to)      p.set('date_to',filters.date_to);
      if(filters.machine_id)   p.set('machine_id',filters.machine_id);
      if(filters.reference_id) p.set('reference_id',filters.reference_id);
      setRows(await api.get('/api/reports?'+p.toString()));
    } catch(e){ setError(e.message); }
    finally{ setLoading(false); }
  };
  useEffect(()=>{ load(); },[]);

  const setF = (k,v) => setFilters(f=>({...f,[k]:v}));

  const loadShiftDetail = async (shiftId) => {
    try {
      const d = await api.get(`/api/shifts/${shiftId}`);
      setShiftDetail(d);
    } catch(e){ setError(e.message); }
  };

  const totalMeters  = rows.reduce((a,r)=>a+(Number(r.total_meters)||0),0);
  const totalPieces  = rows.reduce((a,r)=>a+(Number(r.total_pieces_ok)||0),0);
  const totalRej     = rows.reduce((a,r)=>a+(Number(r.total_rejected)||0),0);
  const totalStop    = rows.reduce((a,r)=>a+(Number(r.stop_min)||0),0);

  return (
    <div className="space-y-4">
      <h1 className="text-2xl font-bold text-gray-900">📈 Relatórios</h1>

      {/* Filtros */}
      <div className="bg-white rounded-xl shadow-sm p-4">
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
          <Input label="Data Início" type="date" value={filters.date_from} onChange={e=>setF('date_from',e.target.value)}/>
          <Input label="Data Fim" type="date" value={filters.date_to} onChange={e=>setF('date_to',e.target.value)}/>
          <Field label="Máquina">
            <select value={filters.machine_id} onChange={e=>setF('machine_id',e.target.value)} className="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
              <option value="">Todas as máquinas</option>
              {machines.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
            </select>
          </Field>
          <Field label="Produto / Referência">
            <select value={filters.reference_id} onChange={e=>setF('reference_id',e.target.value)} className="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
              <option value="">Todos os produtos</option>
              {refs.map(r=><option key={r.id} value={r.id}>{r.name} ({r.code})</option>)}
            </select>
          </Field>
        </div>
        <div className="flex justify-end mt-3">
          <Btn onClick={load} disabled={loading}>{loading?'A carregar…':'Aplicar Filtros'}</Btn>
        </div>
      </div>

      {error&&<Alert type="error">{error}</Alert>}

      {/* KPIs */}
      {rows.length>0&&(
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
          <KpiCard label="Turnos" value={rows.length} color="blue"/>
          <KpiCard label="Metros/Peças ext." value={totalMeters.toFixed(0)} color="blue"/>
          <KpiCard label="Peças inj. OK" value={totalPieces} color="green"/>
          <KpiCard label="Total paragens" value={`${totalStop} min`} color="amber"/>
        </div>
      )}

      {/* Table */}
      <div className="bg-white rounded-xl shadow-sm overflow-hidden">
        {loading?<div className="flex justify-center py-12"><Spinner/></div>:
         rows.length===0?<EmptyState icon="📊" title="Sem dados" desc="Ajuste os filtros e clique em Aplicar"/>:(
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-gray-50 text-xs text-gray-500 uppercase">
                <tr>
                  <th className="px-3 py-2.5 text-left">Data</th>
                  <th className="px-3 py-2.5 text-center">Turno</th>
                  <th className="px-3 py-2.5 text-left">Máquina</th>
                  <th className="px-3 py-2.5 text-left">Produto</th>
                  <th className="px-3 py-2.5 text-left">Operador</th>
                  <th className="px-3 py-2.5 text-right">Metros/Peças</th>
                  <th className="px-3 py-2.5 text-right">Peças OK</th>
                  <th className="px-3 py-2.5 text-right">Rej.</th>
                  <th className="px-3 py-2.5 text-right">Paragens</th>
                  <th className="px-3 py-2.5"/>
                </tr>
              </thead>
              <tbody>
                {rows.map(r=>(
                  <tr key={r.id} className="border-t table-row">
                    <td className="px-3 py-2.5 font-mono text-xs">{r.date}</td>
                    <td className="px-3 py-2.5 text-center"><Badge text={`T${r.shift_number}`} color={r.shift_number===1?'amber':r.shift_number===2?'orange':'indigo'}/></td>
                    <td className="px-3 py-2.5">
                      <span className={`text-xs font-bold mr-1 ${r.machine_type==='extrusao'?'text-blue-600':'text-orange-600'}`}>●</span>
                      {r.machine_name}
                    </td>
                    <td className="px-3 py-2.5">
                      <div className="font-medium text-gray-900">{r.ref_name||'—'}</div>
                      {r.ref_code&&<div className="text-xs font-mono text-gray-400">{r.ref_code}</div>}
                    </td>
                    <td className="px-3 py-2.5 text-gray-600">{r.operator_name||'—'} {r.operator_number?<span className="text-xs text-gray-400">(#{r.operator_number})</span>:''}</td>
                    <td className="px-3 py-2.5 text-right">{Number(r.total_meters||0).toFixed(0)}</td>
                    <td className="px-3 py-2.5 text-right font-medium text-green-700">{r.total_pieces_ok||0}</td>
                    <td className="px-3 py-2.5 text-right text-red-500">{r.total_rejected||0}</td>
                    <td className="px-3 py-2.5 text-right text-gray-500">{r.stop_min||0} min</td>
                    <td className="px-3 py-2.5 text-right">
                      <button onClick={()=>loadShiftDetail(r.id)} className="bg-blue-50 hover:bg-blue-100 text-blue-600 text-xs font-medium px-2 py-1 rounded-lg transition-colors">✏️ Ver/Editar</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {/* Shift Detail Modal */}
      {shiftDetail&&(
        <Modal open={!!shiftDetail} onClose={()=>setShiftDetail(null)} title={`Detalhe Turno — ${shiftDetail.machine_name} T${shiftDetail.shift_number} ${shiftDetail.date}`} size="xl">
          <div className="space-y-4">
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">
              <div><span className="text-gray-400">Produto:</span> <strong>{shiftDetail.ref_name||'—'}</strong></div>
              <div><span className="text-gray-400">Ref.:</span> <span className="font-mono">{shiftDetail.ref_code||'—'}</span></div>
              <div><span className="text-gray-400">Operador:</span> {shiftDetail.operator_name} (#{shiftDetail.operator_number})</div>
              <div><span className="text-gray-400">Ordem:</span> {shiftDetail.order_number||'—'}</div>
            </div>
            {shiftDetail.entries?.length>0?(
              <div className="overflow-x-auto">
                <table className="w-full text-sm border rounded-lg overflow-hidden">
                  <thead className="bg-gray-50 text-xs text-gray-500 uppercase">
                    <tr>
                      <th className="px-3 py-2 text-left">Hora Reg.</th>
                      {shiftDetail.machine_type==='extrusao'?<>
                        <th className="px-3 py-2 text-right">Rolos</th>
                        <th className="px-3 py-2 text-right">Metros</th>
                      </>:<>
                        <th className="px-3 py-2 text-right">Peças OK</th>
                        <th className="px-3 py-2 text-right">Contador</th>
                      </>}
                      <th className="px-3 py-2 text-right">Rej.</th>
                      <th className="px-3 py-2 text-right">Início</th>
                      <th className="px-3 py-2 text-right">Fim</th>
                      <th className="px-3 py-2 text-left">Código Palete</th>
                      <th className="px-3 py-2"/>
                    </tr>
                  </thead>
                  <tbody>
                    {shiftDetail.entries.map(e=>(
                      <tr key={e.id} className="border-t">
                        <td className="px-3 py-2 font-mono text-xs text-gray-400">{e.created_at?.slice(11,16)||'—'}</td>
                        {shiftDetail.machine_type==='extrusao'?<>
                          <td className="px-3 py-2 text-right">{e.rolls_bundles||0}</td>
                          <td className="px-3 py-2 text-right">{e.meters_pieces||0}</td>
                        </>:<>
                          <td className="px-3 py-2 text-right font-medium text-green-700">{e.pieces_ok||0}</td>
                          <td className="px-3 py-2 text-right">{e.counter||'—'}</td>
                        </>}
                        <td className="px-3 py-2 text-right text-red-500">{e.rejected||e.pieces_rejected||0}</td>
                        <td className="px-3 py-2 text-right text-gray-400 text-xs">{e.start_time||'—'}</td>
                        <td className="px-3 py-2 text-right text-gray-400 text-xs">{e.end_time||'—'}</td>
                        <td className="px-3 py-2 font-mono text-xs text-green-700 font-bold">{buildPalletCode(e,shiftDetail)}</td>
                        <td className="px-3 py-2 text-right flex gap-1 justify-end">
                          <button onClick={()=>{ setEditErr(''); setEditForm({meters_pieces:e.meters_pieces||0,rolls_bundles:e.rolls_bundles||0,pieces_ok:e.pieces_ok||0,pieces_rejected:e.pieces_rejected||0,rejected:e.rejected||0,counter:e.counter||0,start_time:e.start_time||'',end_time:e.end_time||''}); setEditEntry({entry:e,isExtrusao:shiftDetail.machine_type==='extrusao'}); }} className="text-blue-500 hover:text-blue-700 text-xs px-1.5 py-0.5 rounded hover:bg-blue-50" title="Editar">✏️</button>
                          <button onClick={()=>setDelEntryId(e.id)} className="text-red-400 hover:text-red-600 text-xs px-1.5 py-0.5 rounded hover:bg-red-50" title="Eliminar">🗑</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            ):<div className="text-center text-gray-400 py-6">Sem registos de produção</div>}
          </div>
        </Modal>
      )}

      {/* Edit entry modal */}
      {editEntry&&(
        <Modal open={!!editEntry} onClose={()=>setEditEntry(null)} title="Corrigir Registo" size="sm">
          <div className="space-y-3">
            {editEntry.isExtrusao ? <>
              <div className="grid grid-cols-2 gap-3">
                <Input label="Metros" type="number" min="0" step="0.1" value={editForm.meters_pieces} onChange={e=>setEditForm(f=>({...f,meters_pieces:e.target.value}))}/>
                <Input label="Rolos/Atados" type="number" min="0" value={editForm.rolls_bundles} onChange={e=>setEditForm(f=>({...f,rolls_bundles:e.target.value}))}/>
              </div>
              <Input label="Rejeitado (metros)" type="number" min="0" step="0.1" value={editForm.rejected} onChange={e=>setEditForm(f=>({...f,rejected:e.target.value}))}/>
            </> : <>
              <div className="grid grid-cols-2 gap-3">
                <Input label="Peças OK" type="number" min="0" value={editForm.pieces_ok} onChange={e=>setEditForm(f=>({...f,pieces_ok:e.target.value}))}/>
                <Input label="Contador" type="number" min="0" value={editForm.counter} onChange={e=>setEditForm(f=>({...f,counter:e.target.value}))}/>
              </div>
              <Input label="Peças Rejeitadas" type="number" min="0" value={editForm.pieces_rejected} onChange={e=>setEditForm(f=>({...f,pieces_rejected:e.target.value}))}/>
            </>}
            <div className="grid grid-cols-2 gap-3">
              <Input label="Hora Início" type="time" value={editForm.start_time} onChange={e=>setEditForm(f=>({...f,start_time:e.target.value}))}/>
              <Input label="Hora Fim" type="time" value={editForm.end_time} onChange={e=>setEditForm(f=>({...f,end_time:e.target.value}))}/>
            </div>
            {editErr&&<Alert type="error">{editErr}</Alert>}
            <div className="flex gap-3 justify-end pt-2 border-t">
              <Btn variant="outline" onClick={()=>setEditEntry(null)}>Cancelar</Btn>
              <Btn onClick={saveEditEntry} disabled={editLoading}>{editLoading?'A guardar…':'Guardar Correção'}</Btn>
            </div>
          </div>
        </Modal>
      )}

      {/* Delete entry confirm */}
      {delEntryId&&(
        <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl shadow-xl p-6 max-w-sm w-full">
            <h3 className="font-bold text-gray-900 text-lg mb-2">Eliminar registo?</h3>
            <p className="text-gray-600 text-sm mb-4">Esta ação não pode ser revertida.</p>
            <div className="flex gap-3 justify-end">
              <Btn variant="outline" onClick={()=>setDelEntryId(null)}>Cancelar</Btn>
              <button onClick={doDelEntry} className="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg text-sm font-semibold">Eliminar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── EFFICIENCY PAGE ──────────────────────────────────────────────────────────
function EfficiencyPage() {
  const [data,setData] = useState(null);
  const [loading,setLoading] = useState(true);
  const [error,setError] = useState('');
  const [dateFrom,setDateFrom] = useState(new Date(Date.now()-30*24*60*60*1000).toISOString().slice(0,10));
  const [dateTo,setDateTo] = useState(new Date().toISOString().slice(0,10));
  const chartRef = useRef(null);
  const chartInst = useRef(null);

  const load = useCallback(async () => {
    setLoading(true); setError('');
    try { setData(await api.get(`/api/analytics?date_from=${dateFrom}&date_to=${dateTo}`)); }
    catch(e){ setError(e.message); }
    finally{ setLoading(false); }
  },[dateFrom,dateTo]);
  useEffect(()=>{ load(); },[load]);

  useEffect(()=>{
    if(!data||!chartRef.current) return;
    if(chartInst.current) chartInst.current.destroy();
    const entries = data.efficiencyEntries||[];
    if(!entries.length) return;
    const labels = entries.map(e=>`${e.date?.slice(5)} T${e.shift_number}`);
    chartInst.current = new Chart(chartRef.current, {
      type:'scatter',
      data:{ datasets:[{
        label:'OEE (%)',
        data: entries.map((e,i)=>({
          x: i,
          y: (() => {
            const totalMins = e.start_time&&e.end_time ? (() => {
              const [sh,sm]=e.start_time.split(':').map(Number);
              const [eh,em]=e.end_time.split(':').map(Number);
              return Math.max(0,(eh*60+em)-(sh*60+sm));
            })() : 0;
            const theoreticalShots = totalMins>0&&e.cycle_time_seconds>0 ? (totalMins*60)/e.cycle_time_seconds : 0;
            const perf = theoreticalShots>0&&e.counter>0 ? Math.min(100,(e.counter/theoreticalShots)*100) : 0;
            const qual = (e.pieces_ok+e.pieces_rejected)>0 ? (e.pieces_ok/(e.pieces_ok+e.pieces_rejected))*100 : 0;
            return Math.round(perf*qual/100);
          })()
        })),
        backgroundColor:'rgba(59,130,246,0.7)',
        pointRadius:6,
      }]},
      options:{
        responsive:true,
        maintainAspectRatio:false,
        scales:{
          x:{display:false},
          y:{min:0,max:100,title:{display:true,text:'OEE (%)'}}
        },
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{title:(_,__)=>'',label:ctx=>{const e=entries[ctx.parsed.x]; return [`${e.operator_name} — ${e.machine_name}`,`OEE: ${ctx.parsed.y}%`,`Data: ${e.date}`];}}}
        }
      }
    });
  },[data]);

  if(loading) return <div className="flex justify-center py-20"><Spinner/></div>;

  return (
    <div className="space-y-6">
      <div className="flex items-center justify-between flex-wrap gap-3">
        <h1 className="text-2xl font-bold text-gray-900">⚡ Eficiência &amp; Qualidade</h1>
        <div className="flex items-center gap-2">
          <Input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} className="text-sm"/>
          <span className="text-gray-400">→</span>
          <Input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} className="text-sm"/>
          <Btn size="sm" onClick={load} disabled={loading}>Aplicar</Btn>
        </div>
      </div>

      {error&&<Alert type="error">{error}</Alert>}

      {/* Quality by machine */}
      {data?.qualityByMachine?.length>0&&(
        <div className="bg-white rounded-xl shadow-sm overflow-hidden">
          <div className="p-4 border-b font-bold text-gray-900">Qualidade por Máquina</div>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-gray-50 text-xs text-gray-500 uppercase">
                <tr>
                  <th className="px-4 py-2.5 text-left">Máquina</th>
                  <th className="px-4 py-2.5 text-right">Produzido</th>
                  <th className="px-4 py-2.5 text-right">Rejeitado</th>
                  <th className="px-4 py-2.5 text-right">Taxa Qualidade</th>
                </tr>
              </thead>
              <tbody>
                {data.qualityByMachine.map(m=>{
                  const total = (m.total_ok||0)+(m.total_rejected||0);
                  const pct = total>0 ? Math.round((m.total_ok/total)*100) : null;
                  return (
                    <tr key={m.id} className="border-t table-row">
                      <td className="px-4 py-2.5 font-medium">
                        <span className={`text-xs font-bold mr-1.5 ${m.machine_type==='extrusao'?'text-blue-600':'text-orange-600'}`}>●</span>
                        {m.machine_name}
                      </td>
                      <td className="px-4 py-2.5 text-right">{m.total_ok||0}</td>
                      <td className="px-4 py-2.5 text-right text-red-500">{m.total_rejected||0}</td>
                      <td className="px-4 py-2.5 text-right">
                        {pct!==null?<span className={`font-bold ${pct>=95?'text-green-600':pct>=80?'text-amber-600':'text-red-600'}`}>{pct}%</span>:'—'}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* OEE scatter */}
      {data?.efficiencyEntries?.length>0&&(
        <div className="bg-white rounded-xl shadow-sm p-4">
          <div className="font-bold text-gray-900 mb-3">OEE por Registo (Injeção)</div>
          <div className="chart-container"><canvas ref={chartRef}/></div>
          <p className="text-xs text-gray-400 mt-2 text-center">Apenas registos com tempo de ciclo, horas de início/fim e contador definidos</p>
        </div>
      )}

      {/* Worker performance */}
      {data?.workerPerf?.length>0&&(
        <div className="bg-white rounded-xl shadow-sm overflow-hidden">
          <div className="p-4 border-b font-bold text-gray-900">Performance por Operador (Injeção)</div>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-gray-50 text-xs text-gray-500 uppercase">
                <tr>
                  <th className="px-4 py-2.5 text-left">Operador</th>
                  <th className="px-4 py-2.5 text-right">Turnos</th>
                  <th className="px-4 py-2.5 text-right">Peças OK</th>
                  <th className="px-4 py-2.5 text-right">Rejeitadas</th>
                  <th className="px-4 py-2.5 text-right">Taxa Qualidade</th>
                </tr>
              </thead>
              <tbody>
                {data.workerPerf.map(w=>{
                  const total = (w.total_ok||0)+(w.total_rejected||0);
                  const pct = total>0 ? Math.round((w.total_ok/total)*100) : null;
                  return (
                    <tr key={w.id} className="border-t table-row">
                      <td className="px-4 py-2.5 font-medium">{w.operator_name} <span className="text-gray-400 text-xs">(#{w.operator_number})</span></td>
                      <td className="px-4 py-2.5 text-right">{w.shift_count}</td>
                      <td className="px-4 py-2.5 text-right text-green-700 font-medium">{w.total_ok||0}</td>
                      <td className="px-4 py-2.5 text-right text-red-500">{w.total_rejected||0}</td>
                      <td className="px-4 py-2.5 text-right">
                        {pct!==null?<span className={`font-bold ${pct>=95?'text-green-600':pct>=80?'text-amber-600':'text-red-600'}`}>{pct}%</span>:'—'}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {(!data?.qualityByMachine?.length&&!data?.efficiencyEntries?.length&&!data?.workerPerf?.length)&&
        <EmptyState icon="⚡" title="Sem dados no período selecionado" desc="Ajuste o intervalo de datas e clique em Aplicar"/>}
    </div>
  );
}

// ─── PRODUCTION ANALYSIS PAGE ─────────────────────────────────────────────────
function ProductionAnalysisPage() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');
  const chartDailyRef = useRef(null);
  const chartDailyInst = useRef(null);
  const chartStopRef = useRef(null);
  const chartStopInst = useRef(null);
  const chartEvolRef = useRef(null);
  const chartEvolInst = useRef(null);

  const load = useCallback(async () => {
    setLoading(true); setError('');
    try { setData(await api.get('/api/production-progress')); }
    catch(e) { setError(e.message); }
    finally { setLoading(false); }
  }, []);
  useEffect(() => { load(); }, [load]);

  useEffect(() => {
    if (!data?.daily?.length || !chartDailyRef.current) return;
    if (chartDailyInst.current) chartDailyInst.current.destroy();
    const labels = data.daily.map(d => d.date.slice(5));
    chartDailyInst.current = new Chart(chartDailyRef.current, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: 'Extrusão (metros)', data: data.daily.map(d => Number(d.ext_meters)||0), backgroundColor: 'rgba(37,99,235,0.75)', borderRadius: 4, yAxisID: 'y' },
          { label: 'Injeção (peças)', data: data.daily.map(d => Number(d.inj_pieces)||0), backgroundColor: 'rgba(234,88,12,0.75)', borderRadius: 4, yAxisID: 'y2' },
          { label: 'Rejeitados', data: data.daily.map(d => Number(d.rejected)||0), backgroundColor: 'rgba(239,68,68,0.6)', borderRadius: 4, yAxisID: 'y' },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'top' } },
        scales: {
          y: { beginAtZero: true, position: 'left', title: { display: true, text: 'Extrusão / Rej.' } },
          y2: { beginAtZero: true, position: 'right', title: { display: true, text: 'Injeção' }, grid: { drawOnChartArea: false } }
        }
      }
    });
  }, [data]);

  useEffect(() => {
    if (!data?.stopReasons?.length || !chartStopRef.current) return;
    if (chartStopInst.current) chartStopInst.current.destroy();
    const colors = ['#EF4444','#F97316','#FBBF24','#22C55E','#3B82F6','#8B5CF6','#EC4899','#14B8A6'];
    chartStopInst.current = new Chart(chartStopRef.current, {
      type: 'doughnut',
      data: {
        labels: data.stopReasons.map(s => `${s.code} — ${s.description}`),
        datasets: [{ data: data.stopReasons.map(s => Number(s.total_min)||0), backgroundColor: colors, borderWidth: 2 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'right', labels: { font: { size: 11 }, boxWidth: 12 } } }
      }
    });
  }, [data]);

  useEffect(() => {
    if (!data?.orderDaily?.length || !chartEvolRef.current) return;
    if (chartEvolInst.current) chartEvolInst.current.destroy();
    const allDates = [...new Set(data.daily.map(d => d.date))].sort();
    const labels = allDates.map(d => d.slice(5));
    const orderMap = {};
    data.orderDaily.forEach(r => {
      if (!orderMap[r.order_number]) orderMap[r.order_number] = {};
      orderMap[r.order_number][r.date] = Number(r.produced);
    });
    const COLORS = ['#3B82F6','#F97316','#22C55E','#EF4444','#8B5CF6','#EC4899','#14B8A6','#FBBF24','#84CC16','#6B7280'];
    const datasets = Object.entries(orderMap).map(([orderNum, dayMap], i) => ({
      label: orderNum,
      data: allDates.map(d => dayMap[d] || 0),
      borderColor: COLORS[i % COLORS.length],
      backgroundColor: COLORS[i % COLORS.length] + '22',
      borderWidth: 2, fill: false, tension: 0.3,
      pointRadius: 3, pointHoverRadius: 5
    }));
    chartEvolInst.current = new Chart(chartEvolRef.current, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'top', labels: { font: { size: 11 }, boxWidth: 12 } } },
        scales: {
          y: { beginAtZero: true, title: { display: true, text: 'Produção / dia' } },
          x: { grid: { display: false } }
        }
      }
    });
  }, [data]);

  if (loading) return <div className="flex justify-center py-20"><Spinner/></div>;
  if (error) return <Alert type="error">{error}</Alert>;
  if (!data) return null;

  const orders = data.orders || [];
  const getPct = o => o.quantity > 0 ? Math.min(100, Math.round((Number(o.produced) / Number(o.quantity)) * 100)) : null;
  const alerts80 = orders.filter(o => { const p = getPct(o); return p !== null && p >= 80 && p < 100; });
  const alertsDone = orders.filter(o => { const p = getPct(o); return p !== null && p >= 100; });
  const totalProducedToday = orders.reduce((a,o) => a + (Number(o.produced_today)||0), 0);
  const totalStopToday = orders.reduce((a,o) => a + (Number(o.stop_min_today)||0), 0);
  const openShifts = orders.reduce((a,o) => a + (Number(o.open_shifts)||0), 0);

  const barColor = p => p >= 100 ? 'bg-green-500' : p >= 80 ? 'bg-orange-500' : p >= 50 ? 'bg-blue-500' : p >= 20 ? 'bg-blue-400' : 'bg-gray-300';
  const borderColor = p => p >= 100 ? 'border-l-green-500' : p >= 80 ? 'border-l-orange-500' : 'border-l-blue-400';

  return (
    <div className="space-y-6">
      <div className="flex items-center justify-between flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-bold text-gray-900">📦 Análise de Produção</h1>
          <p className="text-sm text-gray-400 mt-0.5">Progresso das ordens ativas · Últimos 14 dias</p>
        </div>
        <Btn variant="outline" onClick={load} size="sm">↺ Atualizar</Btn>
      </div>

      {/* Alerta 80%+ */}
      {alerts80.length > 0 && (
        <div className="bg-orange-50 border border-orange-300 rounded-xl p-4">
          <div className="flex items-center gap-2 mb-3">
            <span className="text-xl">⚠️</span>
            <span className="font-bold text-orange-800 text-base">
              {alerts80.length} ordem{alerts80.length>1?'s':''} acima de 80% — preparar conclusão
            </span>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            {alerts80.map(o => {
              const p = getPct(o);
              return (
                <div key={o.id} className="bg-white rounded-lg border border-orange-200 p-3 flex items-center gap-3">
                  <div className="w-12 h-12 rounded-full flex items-center justify-center font-extrabold text-lg bg-orange-100 text-orange-700 shrink-0">{p}%</div>
                  <div className="min-w-0">
                    <div className="font-bold text-gray-900 truncate">{o.ref_name||o.ref_code||'—'}</div>
                    <div className="text-xs text-gray-500">{o.order_number} · {o.machine_name}</div>
                    <div className="text-xs text-orange-600 font-medium mt-0.5">
                      {Number(o.produced).toFixed(0)} / {o.quantity} {UNIT_LABELS[o.unit]||''} produzidos
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Ordens concluídas */}
      {alertsDone.length > 0 && (
        <div className="bg-green-50 border border-green-300 rounded-xl p-3 flex items-center gap-3">
          <span className="text-xl">✅</span>
          <span className="font-semibold text-green-800">
            {alertsDone.length} ordem{alertsDone.length>1?'s':''} concluída{alertsDone.length>1?'s':''}: {alertsDone.map(o=>o.order_number).join(', ')} — fechar e atualizar estado
          </span>
        </div>
      )}

      {/* KPIs */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
        <KpiCard label="Ordens ativas" value={orders.length} color="blue"/>
        <KpiCard label="Turnos abertos agora" value={openShifts} color={openShifts>0?'green':'gray'}/>
        <KpiCard label="Produzido hoje" value={totalProducedToday.toFixed(0)} color="blue" sub="metros + peças OK"/>
        <KpiCard label="Paragens hoje" value={`${totalStopToday} min`} color={totalStopToday>120?'red':'amber'}/>
      </div>

      {/* Progresso por ordem */}
      <div className="bg-white rounded-xl shadow-sm overflow-hidden">
        <div className="p-4 border-b flex items-center justify-between">
          <h2 className="font-bold text-gray-900">Progresso por Ordem</h2>
          <span className="text-xs text-gray-400">{orders.length} ativas</span>
        </div>
        {orders.length === 0 ? (
          <EmptyState icon="📦" title="Sem ordens ativas" desc="Crie uma ordem de produção para começar"/>
        ) : (
          <div className="divide-y">
            {orders.map(o => {
              const p = getPct(o);
              const hasQty = o.quantity > 0;
              return (
                <div key={o.id} className={`p-4 border-l-4 ${borderColor(p||0)}`}>
                  <div className="flex items-start justify-between gap-4 mb-2">
                    <div className="min-w-0">
                      <div className="flex items-center gap-2 flex-wrap">
                        <span className="font-bold text-gray-900">{o.ref_name||o.order_number}</span>
                        {o.ref_code && <span className="font-mono text-xs text-gray-400">{o.ref_code}</span>}
                        {o.color_name && (
                          <span className="flex items-center gap-1 text-xs text-gray-500">
                            <span className="w-3 h-3 rounded-full inline-block border" style={{background:o.hex_color||'#6B7280'}}/>
                            {o.color_name}
                          </span>
                        )}
                        {Number(o.open_shifts)>0 && (
                          <span className="bg-green-100 text-green-700 text-xs font-bold px-2 py-0.5 rounded-full">● Em produção</span>
                        )}
                      </div>
                      <div className="text-xs text-gray-500 mt-0.5">
                        {o.order_number} · {o.machine_name||'—'}
                        {o.last_shift_date && <span className="ml-2">Último turno: {o.last_shift_date}</span>}
                      </div>
                    </div>
                    <div className="text-right shrink-0">
                      {hasQty ? (
                        <>
                          <div className={`text-2xl font-extrabold ${p>=100?'text-green-600':p>=80?'text-orange-600':'text-blue-600'}`}>{p}%</div>
                          <div className="text-xs text-gray-400">{Number(o.produced).toFixed(0)} / {o.quantity} {UNIT_LABELS[o.unit]||''}</div>
                        </>
                      ) : (
                        <>
                          <div className="text-xl font-bold text-gray-700">{Number(o.produced).toFixed(0)}</div>
                          <div className="text-xs text-gray-400">{UNIT_LABELS[o.unit]||'unid.'} (sem objetivo)</div>
                        </>
                      )}
                    </div>
                  </div>
                  {hasQty && (
                    <div>
                      <div className="w-full bg-gray-100 rounded-full h-2.5">
                        <div className={`h-2.5 rounded-full transition-all ${barColor(p)}`} style={{width:`${Math.min(100,p)}%`}}/>
                      </div>
                      <div className="flex justify-between text-xs text-gray-400 mt-1">
                        <span>
                          {Number(o.shift_count)} turno{Number(o.shift_count)!==1?'s':''}
                          {Number(o.rejected)>0 && <span className="text-red-400 ml-2">· {Number(o.rejected).toFixed(0)} rej.</span>}
                          {Number(o.produced_today)>0 && <span className="text-blue-500 ml-2">· hoje: +{Number(o.produced_today).toFixed(0)}</span>}
                        </span>
                        <span>{Number(o.quantity)-Number(o.produced)>0 ? `Faltam ${(Number(o.quantity)-Number(o.produced)).toFixed(0)} ${UNIT_LABELS[o.unit]||''}` : '✓ Concluído'}</span>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Evolução diária por ordem */}
      {(data.orderDaily?.length > 0) && (() => {
        const allDates = [...new Set(data.daily.map(d => d.date))].sort();
        return (
          <div className="bg-white rounded-xl shadow-sm overflow-hidden">
            <div className="p-4 border-b flex items-center justify-between">
              <h2 className="font-bold text-gray-900">📈 Evolução das Ordens — últimos 14 dias</h2>
              <span className="text-xs text-gray-400">produção diária por ordem</span>
            </div>
            <div className="p-4">
              <div className="chart-container mb-5"><canvas ref={chartEvolRef}/></div>
              <div className="overflow-x-auto">
                <table className="w-full text-xs border-collapse">
                  <thead>
                    <tr className="bg-gray-50">
                      <th className="text-left px-3 py-2 font-semibold text-gray-600 sticky left-0 bg-gray-50 min-w-[130px]">Ordem / Ref.</th>
                      {allDates.map(d => (
                        <th key={d} className="px-1 py-2 text-center text-gray-400 font-normal min-w-[42px]">{d.slice(5)}</th>
                      ))}
                      <th className="px-3 py-2 text-right font-semibold text-gray-600">Total</th>
                    </tr>
                  </thead>
                  <tbody>
                    {orders.map(order => {
                      const dayMap = {};
                      data.orderDaily.filter(r => r.order_number === order.order_number)
                        .forEach(r => { dayMap[r.date] = Number(r.produced); });
                      const rowTotal = Object.values(dayMap).reduce((a,v) => a+v, 0);
                      const maxVal = Math.max(...Object.values(dayMap), 1);
                      return (
                        <tr key={order.id} className="border-t hover:bg-gray-50">
                          <td className="px-3 py-2 font-medium text-gray-800 sticky left-0 bg-white">
                            <div className="truncate max-w-[120px]" title={order.ref_name||order.order_number}>
                              {order.ref_code || order.order_number}
                            </div>
                            <div className="text-gray-400 font-normal">{order.machine_name}</div>
                          </td>
                          {allDates.map(d => {
                            const val = dayMap[d] || 0;
                            const alpha = val > 0 ? (val/maxVal)*0.65+0.15 : 0;
                            const style = val > 0 ? { background: `rgba(59,130,246,${alpha})`, color: alpha > 0.55 ? 'white' : '#1e40af' } : {};
                            return (
                              <td key={d} className="px-1 py-2 text-center" style={style}>
                                {val > 0 ? Number(val).toFixed(0) : <span className="text-gray-200">·</span>}
                              </td>
                            );
                          })}
                          <td className="px-3 py-2 text-right font-bold text-blue-700">{rowTotal.toFixed(0)}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                  <tfoot className="bg-gray-50 border-t-2 border-gray-200 font-semibold text-xs">
                    <tr>
                      <td className="px-3 py-2 text-gray-600 sticky left-0 bg-gray-50">Total / dia</td>
                      {allDates.map(d => {
                        const dayTotal = orders.reduce((acc, order) => {
                          const r = data.orderDaily.find(x => x.order_number===order.order_number && x.date===d);
                          return acc + (r ? Number(r.produced) : 0);
                        }, 0);
                        return <td key={d} className="px-1 py-2 text-center text-gray-700">{dayTotal>0?dayTotal.toFixed(0):<span className="text-gray-200">·</span>}</td>;
                      })}
                      <td className="px-3 py-2 text-right text-blue-700">
                        {orders.reduce((acc, order) => acc + data.orderDaily.filter(r => r.order_number===order.order_number).reduce((a,r) => a+Number(r.produced),0), 0).toFixed(0)}
                      </td>
                    </tr>
                  </tfoot>
                </table>
              </div>
            </div>
          </div>
        );
      })()}

      {/* Charts */}
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div className="bg-white rounded-xl shadow-sm p-4">
          <h2 className="font-bold text-gray-900 mb-3">Produção diária — últimos 14 dias</h2>
          {data.daily?.length > 0
            ? <div className="chart-container"><canvas ref={chartDailyRef}/></div>
            : <EmptyState icon="📊" title="Sem dados no período"/>}
        </div>
        <div className="bg-white rounded-xl shadow-sm p-4">
          <h2 className="font-bold text-gray-900 mb-3">Paragens por motivo — últimos 14 dias</h2>
          {data.stopReasons?.length > 0
            ? <div className="chart-container"><canvas ref={chartStopRef}/></div>
            : <EmptyState icon="⏸️" title="Sem paragens registadas"/>}
        </div>
      </div>

      {/* Stoppage table */}
      {data.stopReasons?.length > 0 && (
        <div className="bg-white rounded-xl shadow-sm overflow-hidden">
          <div className="p-4 border-b font-bold text-gray-900">Top Motivos de Paragem (14 dias)</div>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-gray-50 text-xs text-gray-500 uppercase">
                <tr>
                  <th className="px-4 py-2.5 text-left">Cód.</th>
                  <th className="px-4 py-2.5 text-left">Descrição</th>
                  <th className="px-4 py-2.5 text-left">Categoria</th>
                  <th className="px-4 py-2.5 text-right">Ocorrências</th>
                  <th className="px-4 py-2.5 text-right">Tempo total</th>
                  <th className="px-4 py-2.5 text-right">Média/ocorr.</th>
                </tr>
              </thead>
              <tbody>
                {data.stopReasons.map((s,i) => (
                  <tr key={s.code} className="border-t table-row">
                    <td className="px-4 py-2.5 font-mono font-bold text-gray-700">{s.code}</td>
                    <td className="px-4 py-2.5">{s.description}</td>
                    <td className="px-4 py-2.5 text-gray-500">{s.category}</td>
                    <td className="px-4 py-2.5 text-right">{s.cnt}</td>
                    <td className="px-4 py-2.5 text-right font-medium">
                      <span className={i===0?'text-red-600':i===1?'text-orange-500':''}>{s.total_min} min</span>
                    </td>
                    <td className="px-4 py-2.5 text-right text-gray-500">{Math.round(s.total_min/s.cnt)} min</td>
                  </tr>
                ))}
              </tbody>
              <tfoot className="bg-gray-50 font-bold text-sm border-t">
                <tr>
                  <td className="px-4 py-2.5" colSpan={3}>Total</td>
                  <td className="px-4 py-2.5 text-right">{data.stopReasons.reduce((a,s)=>a+Number(s.cnt),0)}</td>
                  <td className="px-4 py-2.5 text-right">{data.stopReasons.reduce((a,s)=>a+Number(s.total_min),0)} min</td>
                  <td/>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── APP ROUTER ───────────────────────────────────────────────────────────────
function AdminApp() {
  const [page,setPage] = useState(()=>{
    const h = window.location.hash;
    if(h.startsWith('#/admin/')) return h.replace('#/admin/','');
    return 'dashboard';
  });
  useEffect(()=>{ window.location.hash = '#/admin/'+page; },[page]);
  const pages = { dashboard:<Dashboard/>, producao:<ProductionAnalysisPage/>, orders:<OrdersPage/>, references:<ReferencesPage/>, colors:<ColorsPage/>, operators:<OperatorsPage/>, machines:<MachinesPage/>, 'stoppage-codes':<StopCodesPage/>, reports:<ReportsPage/>, efficiency:<EfficiencyPage/> };
  return <AdminLayout page={page} setPage={setPage}>{pages[page]||<Dashboard/>}</AdminLayout>;
}

function App() {
  const {user} = useAuth();
  const [hash,setHash] = useState(window.location.hash||'#/');
  useEffect(()=>{
    const h = ()=>setHash(window.location.hash||'#/');
    window.addEventListener('hashchange',h);
    return ()=>window.removeEventListener('hashchange',h);
  },[]);

  if(!user) return <LoginPage/>;
  if(user.role==='quality') return <QualityPage/>;
  if(user.role==='admin') return <AdminApp/>;
  const m = hash.match(/#\/operator\/(\d+)/);
  if(m) return <OperatorPage machineId={Number(m[1])}/>;
  return <LoginPage/>;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<AuthProvider><App/></AuthProvider>);
</script>
</body>
</html>
